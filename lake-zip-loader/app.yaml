name: lake-zip-loader
language: python
variables:
  - name: TABLE_NAME
    inputType: FreeText
    description: Lakehouse table to write parquet files into and register in the Iceberg REST catalog
    defaultValue: ac_telemetry_prod_test
  - name: UPLOAD_API_KEY
    inputType: FreeText
    description: Shared secret required in the X-Api-Key header on PUT /files uploads (fail-closed when unset)
    defaultValue: ""
  - name: LOGLEVEL
    inputType: FreeText
    description: Application logging level
    defaultValue: INFO
dockerfile: dockerfile
runEntryPoint: main.py
defaultFile: main.py
