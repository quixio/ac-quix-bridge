<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Telemetry Explorer</title>
  <script src="https://cdn.plot.ly/plotly-2.35.0.min.js"></script>
  <style>
    :root {
      --bg: #0f1117;
      --surface: #1a1d27;
      --border: #2d3047;
      --text: #e2e8f0;
      --text-muted: #8892a4;
      --accent: #4f8ef7;
      --green: #34d399;
      --orange: #f59e0b;
      --red: #f87171;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      background: var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, monospace;
      min-height: 100vh;
      padding: 1.5rem;
      padding-right: 400px;
    }
    @media (max-width: 1200px) {
      body { padding-right: 300px; }
    }
    h1 { font-size: 1.4rem; font-weight: 600; margin-bottom: 1.5rem; }
    h1 span { color: var(--accent); }

    .panel {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 1rem 1.25rem;
      margin-bottom: 1rem;
    }
    .panel-title {
      font-size: 0.72rem;
      text-transform: uppercase;
      letter-spacing: 0.07em;
      color: var(--text-muted);
      margin-bottom: 0.75rem;
    }
    .panel-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 0.75rem;
    }
    .panel-header .panel-title { margin-bottom: 0; }
    .panel-collapse-btn {
      background: none;
      border: 1px solid var(--border);
      border-radius: 4px;
      color: var(--text-muted);
      cursor: pointer;
      padding: 0.15rem 0.5rem;
      font-size: 0.78rem;
      line-height: 1;
      transition: all 0.15s;
    }
    .panel-collapse-btn:hover {
      border-color: var(--accent);
      color: var(--accent);
    }
    .panel.collapsed .panel-body { display: none; }

    .selections { display: flex; flex-direction: column; gap: 0.75rem; }
    .selection-row {
      display: flex;
      align-items: last baseline;
      gap: 0.5rem;
      flex-wrap: wrap;
      padding-bottom: 0.5rem;
      border-bottom: 1px solid var(--border);
    }
    .selection-row:last-child { border-bottom: none; padding-bottom: 0; }
    .color-dot {
      width: 10px; height: 10px; border-radius: 50%; flex-shrink: 0;
    }
    select {
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 6px;
      padding: 0.3rem 0.5rem;
      color: var(--text);
      font-size: 0.78rem;
      outline: none;
      min-width: 0;
    }
    select:focus { border-color: var(--accent); }
    .part-select { max-width: 140px; }
    .part-label {
      font-size: 0.6rem;
      text-transform: uppercase;
      letter-spacing: 0.04em;
      color: var(--text-muted);
      opacity: 0.5;
    }
    .part-group {
      display: flex;
      flex-direction: column;
      gap: 0.1rem;
    }

    .lap-checkboxes {
      display: flex;
      flex-wrap: wrap;
      gap: 0.3rem;
      align-items: center;
      min-height: 26px;
    }
    .lap-cb {
      display: flex;
      align-items: center;
      gap: 0.2rem;
      padding: 0.15rem 0.45rem;
      border-radius: 6px;
      border: 1px solid var(--border);
      font-size: 0.75rem;
      color: var(--text-muted);
      cursor: pointer;
      user-select: none;
      transition: all 0.15s;
    }
    .lap-cb:hover { border-color: var(--accent); }
    .lap-cb.checked {
      background: rgba(79,142,247,0.15);
      border-color: var(--accent);
      color: var(--accent);
    }
    .lap-cb input { display: none; }
    .lap-info {
      font-size: 0.65rem;
      color: var(--text-muted);
      opacity: 0.7;
    }

    .btn {
      background: var(--accent);
      border: none;
      border-radius: 6px;
      padding: 0.4rem 1rem;
      color: #fff;
      font-size: 0.85rem;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.15s;
    }
    .btn:hover { background: #3a7ae4; }
    .btn:disabled { background: var(--border); cursor: wait; }
    .btn-sm { padding: 0.3rem 0.7rem; font-size: 0.78rem; }
    .btn-xs { padding: 0.15rem 0.4rem; font-size: 0.68rem; }
    .btn-outline {
      background: transparent;
      border: 1px solid var(--border);
      color: var(--text-muted);
    }
    .btn-outline:hover { border-color: var(--accent); color: var(--text); }
    .btn-danger { background: var(--red); }
    .btn-danger:hover { background: #e05858; }
    .btn-add { background: var(--green); }
    .btn-add:hover { background: #2ab886; }

    .signal-chips {
      display: flex;
      flex-wrap: wrap;
      gap: 0.4rem;
      margin-top: 0.35rem;
      margin-bottom: 0.5rem;
    }
    .chip {
      padding: 0.25rem 0.6rem;
      border-radius: 999px;
      font-size: 0.75rem;
      cursor: pointer;
      border: 1px solid var(--border);
      color: var(--text-muted);
      transition: all 0.15s;
      user-select: none;
    }
    .chip.active {
      background: rgba(79,142,247,0.2);
      border-color: var(--accent);
      color: var(--accent);
    }
    .chip:hover { border-color: var(--accent); }
    .cat-section { margin-bottom: 0.25rem; }
    .cat-header {
      display: flex;
      align-items: center;
      gap: 0.5rem;
      margin-top: 0.5rem;
      margin-bottom: 0.25rem;
    }
    .cat-header:first-child { margin-top: 0; }
    .cat-label {
      font-size: 0.68rem;
      text-transform: uppercase;
      letter-spacing: 0.06em;
      color: var(--text-muted);
      opacity: 0.6;
    }
    .cat-toggle {
      font-size: 0.62rem;
      color: var(--text-muted);
      opacity: 0.5;
      cursor: pointer;
      border: none;
      background: none;
      padding: 0;
      text-decoration: underline;
    }
    .cat-toggle:hover { opacity: 1; color: var(--accent); }

    .charts { display: flex; flex-direction: column; gap: 0.25rem; }
    .chart-container {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 0.5rem;
    }
    .chart-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 0.5rem 0.25rem 0.5rem;
      font-size: 0.78rem;
      color: var(--text-muted);
    }
    .chart-header label {
      display: flex;
      align-items: center;
      gap: 0.3rem;
      cursor: pointer;
      user-select: none;
    }
    .chart-header input[type="checkbox"] {
      accent-color: var(--accent);
    }

    /* Sticky track map in top-right corner */
    .track-map-panel {
      position: fixed;
      top: 1rem;
      right: 1rem;
      width: 360px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 0.5rem;
      z-index: 100;
      box-shadow: 0 4px 18px rgba(0,0,0,0.4);
      max-height: calc(100vh - 2rem);
      overflow-y: auto;
    }
    .zoom-row {
      display: flex;
      align-items: center;
      gap: 0.5rem;
      padding: 0.25rem 0.3rem 0.5rem;
      font-size: 0.7rem;
      color: var(--text-muted);
    }
    .zoom-row input[type="range"] {
      flex: 1;
      accent-color: var(--accent);
    }
    .zoom-row .zoom-val {
      color: var(--text);
      min-width: 2.2rem;
      text-align: right;
      font-variant-numeric: tabular-nums;
    }
    .track-map-panel.collapsed .zoom-row { display: none; }
    .track-map-panel .panel-title {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 0.25rem;
    }
    .track-map-panel .toggle-btn {
      background: none;
      border: none;
      color: var(--text-muted);
      cursor: pointer;
      font-size: 0.9rem;
      padding: 0 0.3rem;
    }
    .track-map-panel .toggle-btn:hover { color: var(--accent); }
    .track-map-panel.collapsed #track-map { display: none; }
    .track-map-panel.collapsed .track-readout { display: none; }
    .track-readout {
      font-size: 0.72rem;
      color: var(--text-muted);
      padding: 0.35rem 0.25rem 0.25rem;
      border-top: 1px solid var(--border);
      margin-top: 0.4rem;
    }
    .readout-table {
      width: 100%;
      border-collapse: collapse;
      font-variant-numeric: tabular-nums;
    }
    .readout-table td {
      padding: 0.18rem 0.35rem;
      vertical-align: middle;
      border-bottom: 1px solid rgba(45, 48, 71, 0.5);
    }
    .readout-table tr:last-child td { border-bottom: none; }
    .readout-table td.lbl {
      color: var(--text-muted);
      font-size: 0.7rem;
      white-space: nowrap;
      max-width: 130px;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .readout-table td.val {
      color: var(--text);
      text-align: right;
      font-size: 0.72rem;
      white-space: nowrap;
    }
    .readout-table td.val .u {
      color: var(--text-muted);
      font-size: 0.62rem;
      margin-left: 0.15rem;
    }
    .readout-table tr.pos-row td.lbl { color: var(--accent); font-weight: 600; }
    .readout-table tr.more-row td {
      color: var(--text-muted);
      opacity: 0.55;
      font-style: italic;
      text-align: center;
      padding: 0.1rem;
    }
    .readout-table tr.more-row td.lbl,
    .readout-table tr.more-row td.val {
      text-align: center;
    }

    .video-placeholder {
      width: 100%;
      aspect-ratio: 16 / 9;
      background: #0b0d13;
      border: 1px dashed var(--border);
      border-radius: 8px;
      display: flex;
      align-items: center;
      justify-content: center;
      color: var(--text-muted);
    }
    .video-placeholder-inner { text-align: center; }
    .video-icon {
      font-size: 1.6rem;
      color: var(--text-muted);
      opacity: 0.45;
      margin-bottom: 0.3rem;
    }
    .video-label {
      font-size: 0.72rem;
      color: var(--text);
      opacity: 0.7;
    }
    .video-hint {
      font-size: 0.62rem;
      color: var(--text-muted);
      opacity: 0.6;
      margin-top: 0.2rem;
    }
    .track-map-panel.collapsed .video-placeholder { display: none; }

    @media (max-width: 1200px) {
      .track-map-panel { width: 280px; }
    }

    .status-bar {
      font-size: 0.78rem;
      color: var(--text-muted);
      margin-top: 0.75rem;
    }
    .error { color: var(--red); }
    .loading-spinner {
      display: inline-block;
      width: 14px; height: 14px;
      border: 2px solid var(--border);
      border-top-color: var(--accent);
      border-radius: 50%;
      animation: spin 0.6s linear infinite;
      vertical-align: middle;
      margin-right: 0.4rem;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
</head>
<body>

<h1>Telemetry <span>Explorer</span></h1>

<!-- Sticky track map panel (top-right) -->
<div class="track-map-panel" id="track-panel">
  <div class="panel-title">
    <span>Track Map</span>
    <button class="toggle-btn" onclick="document.getElementById('track-panel').classList.toggle('collapsed')" title="Collapse">−</button>
  </div>
  <div id="track-map" style="height: 420px;"></div>
  <div class="zoom-row">
    <span>Zoom</span>
    <input type="range" id="track-zoom" min="1" max="8" step="0.1" value="1" oninput="onZoomChange(this.value)">
    <span class="zoom-val" id="track-zoom-val">1.0x</span>
  </div>
  <div class="track-readout" id="track-readout"></div>

  <div class="panel-title" style="margin-top: 0.75rem;">Video</div>
  <div class="video-placeholder" id="video-placeholder">
    <div class="video-placeholder-inner">
      <div class="video-icon">▶</div>
      <div class="video-label">Video will appear here</div>
      <div class="video-hint">synced with marker position (coming soon)</div>
    </div>
  </div>
</div>

<!-- Session/Lap selection -->
<div class="panel" id="panel-sessions">
  <div class="panel-header">
    <div class="panel-title">Select sessions and laps to overlay</div>
    <button class="panel-collapse-btn" onclick="togglePanel('panel-sessions', this)">− Hide</button>
  </div>
  <div class="panel-body">
    <div class="selections" id="selections"></div>
    <div style="margin-top: 0.75rem; display: flex; gap: 0.5rem;">
      <button class="btn btn-sm btn-add" onclick="addRow()">+ Add Session</button>
      <button class="btn btn-sm" onclick="plot()" id="btn-plot">Plot</button>
    </div>
  </div>
</div>

<!-- Signal picker -->
<div class="panel" id="panel-signals">
  <div class="panel-header">
    <div class="panel-title">Signals</div>
    <button class="panel-collapse-btn" onclick="togglePanel('panel-signals', this)">− Hide</button>
  </div>
  <div class="panel-body">
    <div id="signal-container">Loading channels...</div>
  </div>
</div>

<!-- Charts -->
<div class="charts" id="charts"></div>
<div class="status-bar" id="status"></div>

<script>
// 16 distinct colors — each trace (row+lap) gets a unique one
const TRACE_COLORS = [
  '#4f8ef7', '#f59e0b', '#34d399', '#f87171', '#a78bfa',
  '#ec4899', '#06b6d4', '#84cc16', '#f97316', '#8b5cf6',
  '#14b8a6', '#e879f9', '#fb923c', '#38bdf8', '#a3e635',
  '#fbbf24'
];
let globalTraceIdx = 0;

const ROW_COLORS = TRACE_COLORS;
const PART_COLS = ['environment', 'test_rig', 'experiment', 'driver', 'track', 'carModel', 'session_id'];
const PART_LABELS = {
  environment: 'Env', test_rig: 'Rig', experiment: 'Experiment',
  driver: 'Driver', track: 'Track', carModel: 'Car', session_id: 'Session',
};

const PLOTLY_LAYOUT = {
  paper_bgcolor: '#1a1d27',
  plot_bgcolor: '#1a1d27',
  font: { color: '#e2e8f0', size: 11 },
  legend: { orientation: 'v', x: 1.02, y: 1, font: { size: 10 } },
  margin: { t: 10, r: 150, b: 40, l: 55 },
  height: 350,
  xaxis: { color: '#8892a4', gridcolor: '#2d3047', zerolinecolor: '#2d3047' },
  yaxis: { color: '#8892a4', gridcolor: '#2d3047', zerolinecolor: '#2d3047', autorange: true },
};

let sessions = [];   // all partition combos, loaded once
let channels = {};
let rowCount = 0;
let plotDivs = [];

// --- Track state ---
let trackData = null;      // { points: [{x,z,normalizedDistance,radius_m,severity,...}], corners: [...] }
let trackConfig = null;    // { corner_thresholds, colors, ... }
let markerPosition = 0;    // current normalizedCarPosition (0..1), persists across re-plots
let plotSignals = [];      // list of signal keys currently displayed (aligned with plotDivs)
let plotTraces = [];       // per plot: array of {label, color, x, y} used for value lookup
let trackBaseRange = null; // { xMin, xMax, zMin, zMax } of full track (for zoom math)
let trackZoom = 1;         // current zoom factor (1 = fit whole track)

const MAX_READOUTS = 6;

const DEFAULT_ACTIVE = new Set(['speedKmh', 'gas', 'brake', 'rpms']);
const CAT_ORDER = ['Inputs', 'Motion', 'Engine', 'Tyres', 'Suspension & Brakes', 'Environment', 'Car State', 'Session'];

// ---------------------------------------------------------------------------
// Data — loaded once at startup
// ---------------------------------------------------------------------------

async function fetchSessions() {
  const res = await fetch('/api/sessions');
  const json = await res.json();
  sessions = json.sessions || [];
}

async function fetchTrack() {
  try {
    const [tRes, cRes] = await Promise.all([
      fetch('/api/track'),
      fetch('/api/track/config'),
    ]);
    trackData = await tRes.json();
    trackConfig = await cRes.json();
    renderTrackMap();
  } catch (e) {
    console.warn('Track data unavailable:', e);
  }
}

// ---------------------------------------------------------------------------
// Track Map rendering
// ---------------------------------------------------------------------------

function renderTrackMap() {
  if (!trackData || !trackConfig) return;
  const pts = trackData.points;
  if (!pts.length) return;

  const colors = trackConfig.colors;
  const sevLabels = {
    hairpin: `Hairpin (R<${trackConfig.corner_thresholds.hairpin_max}m)`,
    tight: `Tight (${trackConfig.corner_thresholds.hairpin_max}-${trackConfig.corner_thresholds.tight_max}m)`,
    sweeper: `Sweeper (${trackConfig.corner_thresholds.tight_max}-${trackConfig.corner_thresholds.sweeper_max}m)`,
    straight: `Straight (R≥${trackConfig.corner_thresholds.sweeper_max}m)`,
  };

  const traces = [];

  // 1) Single continuous "base" line for visual connectivity (thin neutral)
  //    Ensures the track never shows gaps regardless of severity transitions.
  traces.push({
    x: pts.map(p => p.x),
    y: pts.map(p => p.z),
    mode: 'lines', type: 'scatter',
    line: { color: '#3a3f55', width: 5, shape: 'spline', smoothing: 0.7 },
    hoverinfo: 'skip',
    showlegend: false,
  });

  // 2) Overlay colored segments per severity.
  //    Build contiguous runs bridged with the FIRST point of the next run
  //    so each colored line touches the next one pixel-perfect.
  const order = ['straight', 'sweeper', 'tight', 'hairpin'];
  const runs = {};
  for (const sev of order) runs[sev] = [];

  let curRun = null;
  for (let i = 0; i < pts.length; i++) {
    const p = pts[i];
    if (!curRun || curRun.severity !== p.severity) {
      if (curRun && curRun.x.length) runs[curRun.severity].push(curRun);
      curRun = { severity: p.severity, x: [], z: [] };
      // Prepend the previous point so this segment starts where the last ended
      if (i > 0) {
        curRun.x.push(pts[i - 1].x);
        curRun.z.push(pts[i - 1].z);
      }
    }
    curRun.x.push(p.x);
    curRun.z.push(p.z);
  }
  if (curRun && curRun.x.length) runs[curRun.severity].push(curRun);

  const legendShown = { hairpin: false, tight: false, sweeper: false, straight: false };
  for (const sev of order) {
    for (const run of runs[sev]) {
      traces.push({
        x: run.x, y: run.z,
        mode: 'lines', type: 'scatter',
        line: { color: colors[sev], width: 4, shape: 'spline', smoothing: 0.7 },
        hoverinfo: 'skip',
        name: sevLabels[sev],
        legendgroup: sev,
        showlegend: !legendShown[sev],
      });
      legendShown[sev] = true;
    }
  }

  // 3) Corner number badges
  trackData.corners.forEach(c => {
    traces.push({
      x: [c.mid_x], y: [c.mid_z],
      mode: 'markers+text', type: 'scatter',
      marker: { color: colors[c.severity], size: 16, line: { color: '#0f1117', width: 1.5 } },
      text: [c.label],
      textfont: { color: '#fff', size: 9, family: 'monospace' },
      hoverinfo: 'text',
      hovertext: `${c.label} — ${c.severity} (R=${c.min_radius_m}m)`,
      showlegend: false,
    });
  });

  // 4) Start/Finish
  traces.push({
    x: [pts[0].x], y: [pts[0].z],
    mode: 'markers', type: 'scatter',
    marker: { color: colors.start_finish, size: 11, symbol: 'square', line: { color: '#000', width: 1 } },
    hoverinfo: 'text',
    hovertext: 'Start / Finish',
    name: 'Start/Finish',
    showlegend: true,
  });

  // 5) Moving red dot
  traces.push({
    x: [pts[0].x], y: [pts[0].z],
    mode: 'markers', type: 'scatter',
    marker: { color: colors.marker, size: 13, line: { color: '#fff', width: 2 } },
    hoverinfo: 'text',
    hovertext: 'Position',
    name: 'Current',
    showlegend: false,
  });
  window._markerTraceIdx = traces.length - 1;

  // Compute and cache base ranges for zoom math
  const xs = pts.map(p => p.x), zs = pts.map(p => p.z);
  const xMin = Math.min(...xs), xMax = Math.max(...xs);
  const zMin = Math.min(...zs), zMax = Math.max(...zs);
  const padX = (xMax - xMin) * 0.05;
  const padZ = (zMax - zMin) * 0.05;
  trackBaseRange = {
    xMin: xMin - padX, xMax: xMax + padX,
    zMin: zMin - padZ, zMax: zMax + padZ,
  };

  // Layout: legend on top, no grid, no axis titles
  const layout = {
    paper_bgcolor: '#1a1d27',
    plot_bgcolor: '#1a1d27',
    font: { color: '#e2e8f0', size: 9 },
    margin: { t: 40, r: 4, b: 4, l: 4 },
    showlegend: true,
    legend: {
      orientation: 'h',
      x: 0.5, xanchor: 'center',
      y: 1.08, yanchor: 'bottom',
      font: { size: 8 },
      bgcolor: 'rgba(0,0,0,0)',
      traceorder: 'normal',
    },
    xaxis: {
      visible: false,
      showgrid: false, zeroline: false, showticklabels: false,
      scaleanchor: 'y', scaleratio: 1,
      range: [trackBaseRange.xMin, trackBaseRange.xMax],
    },
    yaxis: {
      visible: false,
      showgrid: false, zeroline: false, showticklabels: false,
      range: [trackBaseRange.zMin, trackBaseRange.zMax],
    },
  };

  const div = document.getElementById('track-map');
  Plotly.newPlot(div, traces, layout, { responsive: true, displayModeBar: false });
  updateMarker(markerPosition, true);
  applyZoom();
}

function onZoomChange(v) {
  trackZoom = parseFloat(v) || 1;
  document.getElementById('track-zoom-val').textContent = trackZoom.toFixed(1) + 'x';
  applyZoom();
}

function applyZoom() {
  if (!trackBaseRange) return;
  const div = document.getElementById('track-map');
  if (!div || !div.layout) return;
  const p = trackPointAtNorm(markerPosition);
  const cx = p ? p.x : (trackBaseRange.xMin + trackBaseRange.xMax) / 2;
  const cz = p ? p.z : (trackBaseRange.zMin + trackBaseRange.zMax) / 2;
  const fullW = trackBaseRange.xMax - trackBaseRange.xMin;
  const fullH = trackBaseRange.zMax - trackBaseRange.zMin;
  const w = fullW / trackZoom;
  const h = fullH / trackZoom;
  Plotly.relayout(div, {
    'xaxis.range': [cx - w / 2, cx + w / 2],
    'yaxis.range': [cz - h / 2, cz + h / 2],
  });
}

function trackPointAtNorm(nd) {
  if (!trackData?.points?.length) return null;
  const pts = trackData.points;
  nd = Math.max(0, Math.min(1, nd));
  // Binary search on normalizedDistance (already sorted)
  let lo = 0, hi = pts.length - 1;
  while (lo < hi) {
    const mid = (lo + hi) >> 1;
    if (pts[mid].normalizedDistance < nd) lo = mid + 1;
    else hi = mid;
  }
  return pts[lo];
}

function updateMarker(nd, forceTrack) {
  markerPosition = nd;

  // Update track dot
  if (forceTrack || trackData) {
    const p = trackPointAtNorm(nd);
    if (p && window._markerTraceIdx !== undefined) {
      const div = document.getElementById('track-map');
      if (div && div.data) {
        Plotly.restyle(div, { x: [[p.x]], y: [[p.z]] }, [window._markerTraceIdx]);
        // Re-center zoom window on the dot when zoomed in
        if (trackZoom > 1.05) applyZoom();
      }
    }
  }

  // Update vertical marker line on every plot (annotations only for corner labels)
  for (let i = 0; i < plotDivs.length; i++) {
    const div = plotDivs[i];
    if (!div.layout) continue;
    Plotly.relayout(div, {
      'shapes[0].x0': nd,
      'shapes[0].x1': nd,
      annotations: div._cornerAnnotations || [],
    });
  }

  updateReadout();
}

function updateReadout() {
  const el = document.getElementById('track-readout');
  if (!el) return;

  const trackPt = trackPointAtNorm(markerPosition);
  const posCell = trackPt
    ? `${(markerPosition * 100).toFixed(1)}% @ ${trackPt.distance_m.toFixed(0)}m`
    : `${(markerPosition * 100).toFixed(1)}%`;

  const rows = [
    `<tr class="pos-row"><td class="lbl">Position</td><td class="val">${posCell}</td></tr>`,
  ];

  // Up to MAX_READOUTS signal values (from first N plots, top trace of each)
  const shown = Math.min(MAX_READOUTS, plotDivs.length);
  for (let i = 0; i < shown; i++) {
    const sig = plotSignals[i];
    const traces = plotTraces[i] || [];
    if (!sig || !traces.length) continue;
    const ch = channels[sig] || { label: sig, unit: '' };
    const t = traces[0];
    const v = interpolateAt(t.x, t.y, markerPosition);
    const valStr = v === null || !isFinite(v)
      ? '—'
      : (Math.abs(v) >= 100 ? v.toFixed(1) : v.toFixed(3));
    const unit = ch.unit.replace(/[\[\]]/g, '').trim();
    rows.push(`<tr><td class="lbl" style="color:${t.color}">${ch.label}</td><td class="val">${valStr}${unit ? ' <span class="u">' + unit + '</span>' : ''}</td></tr>`);
  }

  if (plotDivs.length > MAX_READOUTS) {
    rows.push(`<tr class="more-row"><td class="lbl">...</td><td class="val">+${plotDivs.length - MAX_READOUTS} more</td></tr>`);
  }

  el.innerHTML = `<table class="readout-table"><tbody>${rows.join('')}</tbody></table>`;
}

function interpolateAt(xArr, yArr, xTarget) {
  if (!xArr || !xArr.length) return null;
  if (xTarget <= xArr[0]) return yArr[0];
  if (xTarget >= xArr[xArr.length - 1]) return yArr[yArr.length - 1];
  // Binary search
  let lo = 0, hi = xArr.length - 1;
  while (hi - lo > 1) {
    const mid = (lo + hi) >> 1;
    if (xArr[mid] <= xTarget) lo = mid;
    else hi = mid;
  }
  const x0 = xArr[lo], x1 = xArr[hi];
  const y0 = yArr[lo], y1 = yArr[hi];
  if (x1 === x0) return y0;
  return y0 + (y1 - y0) * (xTarget - x0) / (x1 - x0);
}

// Corner overlay shapes for a plot, based on config colors + enabled checkbox
function buildCornerShapes() {
  if (!trackData?.corners || !trackConfig) return [];
  const colors = trackConfig.colors;
  return trackData.corners.map(c => ({
    type: 'rect',
    xref: 'x', yref: 'paper',
    x0: c.start_norm, x1: c.end_norm,
    y0: 0, y1: 1,
    fillcolor: colors[c.severity],
    opacity: 0.18,
    line: { width: 0 },
    layer: 'below',
  }));
}

function buildCornerAnnotations() {
  if (!trackData?.corners) return [];
  return trackData.corners.map(c => ({
    xref: 'x', yref: 'paper',
    x: (c.start_norm + c.end_norm) / 2,
    y: 1,
    yanchor: 'top',
    text: c.label,
    showarrow: false,
    font: { size: 10, color: '#e2e8f0' },
    bgcolor: 'rgba(15,17,23,0.6)',
    borderpad: 2,
  }));
}

function toggleCornerOverlay(plotIdx, enabled) {
  const div = plotDivs[plotIdx];
  if (!div) return;
  // Preserve the marker shape (always shapes[0])
  const base = [div.layout.shapes[0]];
  const shapes = enabled ? base.concat(buildCornerShapes()) : base;
  // Store corner annotations separately so updateMarker can preserve them
  div._cornerAnnotations = enabled ? buildCornerAnnotations() : [];
  Plotly.relayout(div, { shapes });
  // Refresh so value annotations + corner labels coexist
  updateMarker(markerPosition, false);
}

async function fetchLaps(filters) {
  const p = new URLSearchParams();
  for (const [k, v] of Object.entries(filters)) {
    if (v) p.set(k, v);
  }
  const res = await fetch('/api/laps?' + p);
  const json = await res.json();
  return json.laps || [];
}

// ---------------------------------------------------------------------------
// Client-side partition filtering (instant, no API calls)
// ---------------------------------------------------------------------------

function getDistinctValues(column, upstreamFilters) {
  let filtered = sessions;
  for (const [col, val] of Object.entries(upstreamFilters)) {
    if (val) filtered = filtered.filter(s => String(s[col]) === String(val));
  }
  const vals = [...new Set(filtered.map(s => s[column]))].filter(v => v !== undefined);
  vals.sort();
  return vals;
}

// ---------------------------------------------------------------------------
// Row management — cascading dropdowns (client-side)
// ---------------------------------------------------------------------------

function getRowFilters(idx) {
  const filters = {};
  for (const col of PART_COLS) {
    const sel = document.getElementById(`${col}-${idx}`);
    if (sel) filters[col] = sel.value;
  }
  return filters;
}

function getPreviousRowFilters() {
  const rows = document.querySelectorAll('.selection-row');
  if (!rows.length) return {};
  const last = rows[rows.length - 1];
  return getRowFilters(parseInt(last.dataset.rowIdx));
}

function addRow(defaults) {
  const idx = rowCount++;
  const color = ROW_COLORS[idx % ROW_COLORS.length];
  const prev = defaults || getPreviousRowFilters();

  const row = document.createElement('div');
  row.className = 'selection-row';
  row.id = 'row-' + idx;
  row.dataset.rowIdx = idx;

  let html = '';
  for (const col of PART_COLS) {
    html += `
      <div class="part-group">
        <span class="part-label">${PART_LABELS[col]}</span>
        <select class="part-select" id="${col}-${idx}"
                onchange="onPartChange(${idx}, '${col}')">
          <option value="">...</option>
        </select>
      </div>`;
  }
  html += `
    <div class="part-group">
      <span class="part-label">Laps</span>
      <div class="lap-checkboxes" id="laps-${idx}">
        <span class="lap-info">...</span>
      </div>
    </div>
    <button class="btn btn-xs btn-danger" onclick="removeRow(${idx})">x</button>`;

  row.innerHTML = html;
  document.getElementById('selections').appendChild(row);
  populateDropdowns(idx, 0, prev);
}

function removeRow(idx) {
  const el = document.getElementById('row-' + idx);
  if (el) el.remove();
}

function populateDropdowns(rowIdx, fromColIdx, defaults) {
  for (let ci = fromColIdx; ci < PART_COLS.length; ci++) {
    const col = PART_COLS[ci];
    const sel = document.getElementById(`${col}-${rowIdx}`);
    if (!sel) continue;

    // Build upstream filters from columns before this one
    const upstream = {};
    for (let j = 0; j < ci; j++) {
      const c = PART_COLS[j];
      const s = document.getElementById(`${c}-${rowIdx}`);
      if (s?.value) upstream[c] = s.value;
    }

    const values = getDistinctValues(col, upstream);

    sel.innerHTML = values.length === 1 ? '' : '<option value="">...</option>';
    for (const v of values) {
      const display = col === 'session_id'
        ? String(v).substring(0, 19).replace('T', ' ')
        : (v || '(empty)');
      sel.innerHTML += `<option value="${v}">${display}</option>`;
    }

    // Auto-select: default from previous row, or single value
    const def = defaults?.[col];
    if (def && values.map(String).includes(String(def))) {
      sel.value = def;
    } else if (values.length === 1) {
      sel.value = values[0];
    } else {
      // Can't auto-select — stop cascading, clear downstream
      for (let k = ci + 1; k < PART_COLS.length; k++) {
        const ds = document.getElementById(`${PART_COLS[k]}-${rowIdx}`);
        if (ds) ds.innerHTML = '<option value="">...</option>';
      }
      document.getElementById(`laps-${rowIdx}`).innerHTML = '<span class="lap-info">...</span>';
      return;
    }
  }
  // All dropdowns filled — load laps
  loadLaps(rowIdx);
}

function onPartChange(rowIdx, changedCol) {
  const colIdx = PART_COLS.indexOf(changedCol);
  populateDropdowns(rowIdx, colIdx + 1, null);
}

async function loadLaps(rowIdx) {
  const container = document.getElementById(`laps-${rowIdx}`);
  const filters = getRowFilters(rowIdx);

  if (!PART_COLS.every(c => filters[c])) {
    container.innerHTML = '<span class="lap-info">...</span>';
    return;
  }

  container.innerHTML = '<span class="lap-info">loading...</span>';
  const laps = await fetchLaps(filters);

  if (!laps.length) {
    container.innerHTML = '<span class="lap-info">no laps</span>';
    return;
  }

  container.innerHTML = `
    <button class="btn btn-xs btn-outline" onclick="toggleAllLaps(${rowIdx})">all</button>
  ` + laps.map(l => `
    <label class="lap-cb" onclick="event.preventDefault(); this.classList.toggle('checked'); this.querySelector('input').checked = this.classList.contains('checked');">
      <input type="checkbox" value="${l.lap}">
      L${l.lap}
    </label>
  `).join('');
}

function toggleAllLaps(idx) {
  const labels = document.querySelectorAll(`#laps-${idx} .lap-cb`);
  const anyUnchecked = Array.from(labels).some(l => !l.classList.contains('checked'));
  labels.forEach(l => {
    l.classList.toggle('checked', anyUnchecked);
    l.querySelector('input').checked = anyUnchecked;
  });
}

// ---------------------------------------------------------------------------
// Gather selections
// ---------------------------------------------------------------------------

function getSelections() {
  const result = [];
  let colorIdx = 0;
  document.querySelectorAll('.selection-row').forEach(row => {
    const filters = getRowFilters(parseInt(row.dataset.rowIdx));

    const checked = row.querySelectorAll('.lap-cb input:checked');
    checked.forEach(cb => {
      const lap = parseInt(cb.value);
      const label = [
        filters.experiment, filters.track, filters.carModel,
        `L${lap}`, `(${filters.driver || '?'})`
      ].filter(Boolean).join(' ');
      result.push({
        key: { ...filters },
        lap,
        color: TRACE_COLORS[colorIdx++ % TRACE_COLORS.length],
        label,
      });
    });
  });
  return result;
}

// ---------------------------------------------------------------------------
// Channels / Signals
// ---------------------------------------------------------------------------

function getActiveSignals() {
  return Array.from(document.querySelectorAll('.chip.active')).map(c => c.dataset.signal);
}

function chartTitle(col) {
  const ch = channels[col];
  return ch ? `${ch.label} ${ch.unit}` : col;
}

async function loadChannels() {
  const res = await fetch('/api/channels');
  channels = await res.json();
  renderChannelChips();
}

const MAX_VISIBLE = 8;

function renderChannelChips() {
  const container = document.getElementById('signal-container');
  const groups = {};
  for (const [col, meta] of Object.entries(channels)) {
    const cat = meta.cat || 'Other';
    if (!groups[cat]) groups[cat] = [];
    groups[cat].push(col);
  }

  let html = '';
  for (const cat of CAT_ORDER) {
    const cols = groups[cat];
    if (!cols) continue;
    const collapsed = cols.length > MAX_VISIBLE;
    const catId = cat.replace(/[^a-zA-Z]/g, '');

    html += `<div class="cat-section"><div class="cat-header">`;
    html += `<span class="cat-label">${cat}</span>`;
    if (collapsed) html += `<button class="cat-toggle" onclick="toggleCat('${catId}', this)">show all ${cols.length}</button>`;
    html += `</div><div class="signal-chips" id="cat-${catId}">`;
    for (let i = 0; i < cols.length; i++) {
      const col = cols[i];
      const m = channels[col];
      const active = DEFAULT_ACTIVE.has(col) ? ' active' : '';
      const hidden = collapsed && i >= MAX_VISIBLE ? ' style="display:none" data-extra' : '';
      html += `<span class="chip${active}" data-signal="${col}"${hidden}>${m.label}</span>`;
    }
    html += '</div></div>';
  }
  container.innerHTML = html;
  container.addEventListener('click', e => {
    if (e.target.classList.contains('chip')) e.target.classList.toggle('active');
  });
}

function toggleCat(catId, btn) {
  const chips = document.querySelectorAll(`#cat-${catId} [data-extra]`);
  const showing = chips[0]?.style.display !== 'none';
  chips.forEach(c => c.style.display = showing ? 'none' : '');
  btn.textContent = showing ? 'show all' : 'show less';
}

// ---------------------------------------------------------------------------
// Plot
// ---------------------------------------------------------------------------

async function plot() {
  const selections = getSelections();
  const signals = getActiveSignals();

  if (!selections.length) { setStatus('Check at least one lap', true); return; }
  if (!signals.length) { setStatus('Select at least one signal', true); return; }

  const btn = document.getElementById('btn-plot');
  btn.disabled = true;
  setStatus('<span class="loading-spinner"></span> Loading telemetry...');

  try {
    const allData = await Promise.all(selections.map(sel => {
      const p = new URLSearchParams();
      for (const [k, v] of Object.entries(sel.key)) {
        if (v) p.set(k, v);
      }
      p.set('lap', sel.lap);
      p.set('signals', signals.join(','));
      return fetch('/api/telemetry?' + p)
        .then(r => { if (!r.ok) throw new Error('HTTP ' + r.status); return r.json(); });
    }));

    const chartsDiv = document.getElementById('charts');
    chartsDiv.innerHTML = '';
    plotDivs = [];
    plotSignals = [];
    plotTraces = [];

    for (let si = 0; si < signals.length; si++) {
      const signal = signals[si];
      const container = document.createElement('div');
      container.className = 'chart-container';

      // Header with corner overlay checkbox
      const header = document.createElement('div');
      header.className = 'chart-header';
      header.innerHTML = `
        <span>${chartTitle(signal)}</span>
        <label>
          <input type="checkbox" id="corner-cb-${si}" onchange="toggleCornerOverlay(${si}, this.checked)">
          Show corners
        </label>
      `;
      container.appendChild(header);

      const plotDiv = document.createElement('div');
      container.appendChild(plotDiv);
      chartsDiv.appendChild(container);
      plotDivs.push(plotDiv);
      plotSignals.push(signal);

      const traces = selections.map((sel, i) => {
        const d = allData[i].data;
        const ds = downsample(d.normalizedCarPosition, d[signal]);
        return {
          x: ds.x, y: ds.y,
          type: 'scatter', mode: 'lines',
          name: sel.label,
          line: { color: sel.color, width: 1.5 },
          showlegend: true,
        };
      });
      // Remember for value interpolation at marker
      plotTraces.push(traces.map(t => ({ label: t.name, color: t.line.color, x: t.x, y: t.y })));

      // Marker shape is always shapes[0]; corner overlays appended after when toggled
      const markerShape = {
        type: 'line',
        xref: 'x', yref: 'paper',
        x0: markerPosition, x1: markerPosition,
        y0: 0, y1: 1,
        line: { color: (trackConfig?.colors?.marker) || '#ef4444', width: 1.5, dash: 'solid' },
      };

      Plotly.newPlot(plotDiv, traces, {
        ...PLOTLY_LAYOUT,
        title: null,
        dragmode: false,
        shapes: [markerShape],
        xaxis: {
          ...PLOTLY_LAYOUT.xaxis,
          title: 'Track Position [-]',
          range: [0, 1],
          fixedrange: false,
        },
        yaxis: { ...PLOTLY_LAYOUT.yaxis, title: chartTitle(signal) },
      }, { responsive: true, scrollZoom: false });

      attachMarkerDrag(plotDiv);
    }

    linkXAxes(plotDivs);
    updateMarker(markerPosition, true);
    const totalPts = allData.reduce((sum, d) => sum + d.count, 0);
    setStatus(`Loaded ${totalPts.toLocaleString()} points across ${selections.length} trace(s)`);
  } catch (e) {
    setStatus('Error: ' + e.message, true);
  } finally {
    btn.disabled = false;
  }
}

// ---------------------------------------------------------------------------
// Utilities
// ---------------------------------------------------------------------------

function downsample(x, y, maxPoints = 1500) {
  if (!x || x.length <= maxPoints) return { x, y };
  const step = x.length / maxPoints;
  const nx = [], ny = [];
  for (let i = 0; i < maxPoints; i++) {
    const idx = Math.round(i * step);
    nx.push(x[idx]);
    ny.push(y[idx]);
  }
  return { x: nx, y: ny };
}

function togglePanel(panelId, btn) {
  const p = document.getElementById(panelId);
  if (!p) return;
  p.classList.toggle('collapsed');
  btn.textContent = p.classList.contains('collapsed') ? '+ Show' : '− Hide';
}

function attachMarkerDrag(div) {
  // Drag the vertical marker line via mouse: mousedown on the plot
  // area anywhere, then mousemove updates position while button held.
  let dragging = false;

  // Use Plotly's actual xaxis pixel offset + length for precise mapping
  const pxToX = (ev) => {
    const gd = div;
    if (!gd._fullLayout || !gd._fullLayout.xaxis) return null;
    const rect = gd.getBoundingClientRect();
    const xa = gd._fullLayout.xaxis;
    const px = ev.clientX - rect.left - xa._offset;
    if (xa._length <= 0) return null;
    const frac = Math.max(0, Math.min(1, px / xa._length));
    return xa.range[0] + frac * (xa.range[1] - xa.range[0]);
  };

  div.addEventListener('mousedown', (ev) => {
    if (ev.button !== 0) return;
    const x = pxToX(ev);
    if (x === null) return;
    dragging = true;
    updateMarker(Math.max(0, Math.min(1, x)), true);
    ev.preventDefault();
  });

  window.addEventListener('mousemove', (ev) => {
    if (!dragging) return;
    const x = pxToX(ev);
    if (x === null) return;
    updateMarker(Math.max(0, Math.min(1, x)), true);
  });

  window.addEventListener('mouseup', () => { dragging = false; });
}

function linkXAxes(divs) {
  if (divs.length < 2) return;
  let syncing = false;
  divs.forEach((div, i) => {
    div.on('plotly_relayout', evData => {
      if (syncing) return;
      const update = {};
      if (evData['xaxis.range[0]'] !== undefined && evData['xaxis.range[1]'] !== undefined) {
        update['xaxis.range'] = [evData['xaxis.range[0]'], evData['xaxis.range[1]']];
      } else if (evData['xaxis.autorange']) {
        update['xaxis.autorange'] = true;
        update['yaxis.autorange'] = true;
      } else {
        return;
      }
      syncing = true;
      const others = divs.filter((_, j) => j !== i);
      Promise.all(others.map(o => Plotly.relayout(o, update))).then(() => { syncing = false; });
    });
  });
}

function setStatus(msg, isError = false) {
  const el = document.getElementById('status');
  el.innerHTML = msg;
  el.className = 'status-bar' + (isError ? ' error' : '');
}

// ---------------------------------------------------------------------------
// Init
// ---------------------------------------------------------------------------
(async () => {
  setStatus('<span class="loading-spinner"></span> Loading...');
  try {
    await Promise.all([fetchSessions(), loadChannels(), fetchTrack()]);
    addRow({ experiment: 'Demo run' });
    setStatus(`${sessions.length} sessions loaded. Select partitions, check laps, then click Plot.`);
  } catch (e) {
    setStatus('Failed to initialize: ' + e.message, true);
  }
})();
</script>
