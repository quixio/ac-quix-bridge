<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Telemetry Comparison</title>
  <script src="https://cdn.plot.ly/plotly-2.35.0.min.js"></script>
  <style>
    :root {
      --bg: #0f1117;
      --surface: #1a1d27;
      --border: #2d3047;
      --text: #e2e8f0;
      --text-muted: #8892a4;
      --accent: #4f8ef7;
      --green: #34d399;
      --orange: #f59e0b;
      --red: #f87171;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      background: var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, monospace;
      min-height: 100vh;
      padding: 1.5rem;
    }
    h1 { font-size: 1.4rem; font-weight: 600; margin-bottom: 1.5rem; }
    h1 span { color: var(--accent); }

    .panel {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 1rem 1.25rem;
      margin-bottom: 1rem;
    }
    .panel-title {
      font-size: 0.72rem;
      text-transform: uppercase;
      letter-spacing: 0.07em;
      color: var(--text-muted);
      margin-bottom: 0.75rem;
    }

    .selections { display: flex; flex-direction: column; gap: 0.75rem; }
    .selection-row {
      display: flex;
      align-items: flex-start;
      gap: 0.75rem;
      flex-wrap: wrap;
    }
    .color-dot {
      width: 12px; height: 12px; border-radius: 50%; flex-shrink: 0;
      margin-top: 0.5rem;
    }
    select {
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 6px;
      padding: 0.4rem 0.6rem;
      color: var(--text);
      font-size: 0.82rem;
      outline: none;
    }
    select:focus { border-color: var(--accent); }
    .session-select { min-width: 520px; }

    /* Multi-select lap checkboxes */
    .lap-checkboxes {
      display: flex;
      flex-wrap: wrap;
      gap: 0.35rem;
      align-items: center;
      min-height: 30px;
    }
    .lap-cb {
      display: flex;
      align-items: center;
      gap: 0.25rem;
      padding: 0.2rem 0.5rem;
      border-radius: 6px;
      border: 1px solid var(--border);
      font-size: 0.78rem;
      color: var(--text-muted);
      cursor: pointer;
      user-select: none;
      transition: all 0.15s;
    }
    .lap-cb:hover { border-color: var(--accent); }
    .lap-cb.checked {
      background: rgba(79,142,247,0.15);
      border-color: var(--accent);
      color: var(--accent);
    }
    .lap-cb input { display: none; }
    .lap-info {
      font-size: 0.68rem;
      color: var(--text-muted);
      opacity: 0.7;
    }

    .btn {
      background: var(--accent);
      border: none;
      border-radius: 6px;
      padding: 0.4rem 1rem;
      color: #fff;
      font-size: 0.85rem;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.15s;
    }
    .btn:hover { background: #3a7ae4; }
    .btn:disabled { background: var(--border); cursor: wait; }
    .btn-sm { padding: 0.3rem 0.7rem; font-size: 0.78rem; }
    .btn-outline {
      background: transparent;
      border: 1px solid var(--border);
      color: var(--text-muted);
    }
    .btn-outline:hover { border-color: var(--accent); color: var(--text); }
    .btn-danger { background: var(--red); }
    .btn-danger:hover { background: #e05858; }
    .btn-add { background: var(--green); }
    .btn-add:hover { background: #2ab886; }

    .signal-chips {
      display: flex;
      flex-wrap: wrap;
      gap: 0.4rem;
      margin-top: 0.35rem;
      margin-bottom: 0.5rem;
    }
    .chip {
      padding: 0.25rem 0.6rem;
      border-radius: 999px;
      font-size: 0.75rem;
      cursor: pointer;
      border: 1px solid var(--border);
      color: var(--text-muted);
      transition: all 0.15s;
      user-select: none;
    }
    .chip.active {
      background: rgba(79,142,247,0.2);
      border-color: var(--accent);
      color: var(--accent);
    }
    .chip:hover { border-color: var(--accent); }
    .cat-section { margin-bottom: 0.25rem; }
    .cat-header {
      display: flex;
      align-items: center;
      gap: 0.5rem;
      margin-top: 0.5rem;
      margin-bottom: 0.25rem;
    }
    .cat-header:first-child { margin-top: 0; }
    .cat-label {
      font-size: 0.68rem;
      text-transform: uppercase;
      letter-spacing: 0.06em;
      color: var(--text-muted);
      opacity: 0.6;
    }
    .cat-toggle {
      font-size: 0.62rem;
      color: var(--text-muted);
      opacity: 0.5;
      cursor: pointer;
      border: none;
      background: none;
      padding: 0;
      text-decoration: underline;
    }
    .cat-toggle:hover { opacity: 1; color: var(--accent); }

    .charts { display: flex; flex-direction: column; gap: 0.25rem; }
    .chart-container {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 0.5rem;
    }

    .status-bar {
      font-size: 0.78rem;
      color: var(--text-muted);
      margin-top: 0.75rem;
    }
    .error { color: var(--red); }
    .loading-spinner {
      display: inline-block;
      width: 14px; height: 14px;
      border: 2px solid var(--border);
      border-top-color: var(--accent);
      border-radius: 50%;
      animation: spin 0.6s linear infinite;
      vertical-align: middle;
      margin-right: 0.4rem;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
</head>
<body>

<h1>Telemetry <span>Comparison</span></h1>

<!-- Session/Lap selection -->
<div class="panel">
  <div class="panel-title">Select sessions and laps to overlay</div>
  <div class="selections" id="selections"></div>
  <div style="margin-top: 0.75rem; display: flex; gap: 0.5rem;">
    <button class="btn btn-sm btn-add" onclick="addRow()">+ Add Session</button>
    <button class="btn btn-sm" onclick="overlay()" id="btn-overlay">Plot</button>
  </div>
</div>

<!-- Signal picker -->
<div class="panel">
  <div class="panel-title">Signals</div>
  <div id="signal-container">Loading channels...</div>
</div>

<!-- Charts -->
<div class="charts" id="charts"></div>
<div class="status-bar" id="status"></div>

<script>
// 10 distinguishable colors — each row gets a base color,
// laps within the row get lighter/darker variants
const ROW_COLORS = [
  '#4f8ef7', '#f59e0b', '#34d399', '#f87171', '#a78bfa',
  '#ec4899', '#06b6d4', '#84cc16', '#f97316', '#8b5cf6'
];

function lapColor(rowIdx, lapIdx) {
  const base = ROW_COLORS[rowIdx % ROW_COLORS.length];
  // Shift lightness for each lap: 0 = base, 1 = lighter, 2 = darker, etc.
  if (lapIdx === 0) return base;
  const r = parseInt(base.slice(1,3),16);
  const g = parseInt(base.slice(3,5),16);
  const b = parseInt(base.slice(5,7),16);
  const shift = (lapIdx % 2 === 1 ? 40 : -40) * Math.ceil(lapIdx / 2);
  const clamp = v => Math.max(0, Math.min(255, v + shift));
  return `rgb(${clamp(r)},${clamp(g)},${clamp(b)})`;
}

const PLOTLY_LAYOUT = {
  paper_bgcolor: '#1a1d27',
  plot_bgcolor: '#1a1d27',
  font: { color: '#e2e8f0', size: 11 },
  legend: { orientation: 'h', y: -0.25, font: { size: 10 } },
  margin: { t: 30, r: 20, b: 40, l: 55 },
  height: 250,
  xaxis: { color: '#8892a4', gridcolor: '#2d3047', zerolinecolor: '#2d3047' },
  yaxis: { color: '#8892a4', gridcolor: '#2d3047', zerolinecolor: '#2d3047' },
};

let sessions = [];
let channels = {};  // column -> { label, unit, cat }
let rowCount = 0;
let plotDivs = [];

// Default active signals on load
const DEFAULT_ACTIVE = new Set(['speedKmh', 'gas', 'brake', 'rpms']);

// Category display order
const CAT_ORDER = ['Inputs', 'Motion', 'Engine', 'Tyres', 'Suspension & Brakes', 'Environment', 'Car State', 'Session'];

// ---- Data fetching ----

async function fetchSessions() {
  const res = await fetch('/api/sessions');
  const json = await res.json();
  sessions = json.sessions || [];
}

async function fetchLaps(key) {
  const res = await fetch('/api/laps?' + keyToParams(key));
  const json = await res.json();
  return json.laps || [];
}

// ---- Session label for dropdown ----

function sessionLabel(s) {
  const ts = (s.session_id || '').substring(0, 19).replace('T', ' ');
  const parts = [
    s.environment, s.test_rig, s.experiment,
    s.driver, s.track, s.carModel, ts
  ].filter(Boolean);
  return parts.join(' | ');
}

// Encode all partition fields into option value
function encodeKey(s) {
  return JSON.stringify({
    environment: s.environment || '',
    test_rig: s.test_rig || '',
    experiment: s.experiment || '',
    driver: s.driver || '',
    track: s.track || '',
    carModel: s.carModel || '',
    session_id: s.session_id || '',
  });
}
function decodeKey(val) {
  try { return JSON.parse(val); }
  catch { return null; }
}
function keyToParams(key) {
  const p = new URLSearchParams();
  for (const [k, v] of Object.entries(key)) {
    if (v !== '') p.set(k, v);
  }
  return p;
}

// ---- Row management ----

function addRow() {
  const idx = rowCount++;
  const color = ROW_COLORS[idx % ROW_COLORS.length];
  const row = document.createElement('div');
  row.className = 'selection-row';
  row.id = 'row-' + idx;
  row.dataset.rowIdx = idx;
  row.innerHTML = `
    <div class="color-dot" style="background:${color}"></div>
    <select class="session-select" onchange="onSessionPick(${idx}, this.value)">
      <option value="">Select session...</option>
      ${sessions.map(s =>
        `<option value='${encodeKey(s)}'>${sessionLabel(s)}</option>`
      ).join('')}
    </select>
    <div class="lap-checkboxes" id="laps-${idx}">
      <span class="lap-info">select session first</span>
    </div>
    <button class="btn btn-sm btn-danger" onclick="removeRow(${idx})">x</button>
  `;
  document.getElementById('selections').appendChild(row);
}

function removeRow(idx) {
  const el = document.getElementById('row-' + idx);
  if (el) el.remove();
}

async function onSessionPick(idx, val) {
  const container = document.getElementById('laps-' + idx);
  if (!val) {
    container.innerHTML = '<span class="lap-info">select session first</span>';
    return;
  }
  container.innerHTML = '<span class="lap-info">loading laps...</span>';

  const key = decodeKey(val);
  if (!key) return;

  const laps = await fetchLaps(key);
  if (!laps.length) {
    container.innerHTML = '<span class="lap-info">no laps found</span>';
    return;
  }

  container.innerHTML = laps.map(l => `
    <label class="lap-cb" onclick="this.classList.toggle('checked')">
      <input type="checkbox" value="${l.lap}" data-avg="${l.avg_speed}" data-max="${l.max_speed}">
      L${l.lap}
      <span class="lap-info">${l.avg_speed} avg</span>
    </label>
  `).join('');
}

// ---- Gather all selected session+lap combos ----

function getSelections() {
  const result = [];
  document.querySelectorAll('.selection-row').forEach(row => {
    const rowIdx = parseInt(row.dataset.rowIdx);
    const select = row.querySelector('.session-select');
    const key = decodeKey(select?.value);
    if (!key) return;

    const session = sessions.find(s =>
      s.session_id === key.session_id && s.experiment === key.experiment
      && s.track === key.track && s.carModel === key.carModel
    );

    const checked = row.querySelectorAll('.lap-cb input:checked');
    let lapIdx = 0;
    checked.forEach(cb => {
      result.push({
        key,
        lap: parseInt(cb.value),
        color: lapColor(rowIdx, lapIdx),
        label: `${session?.experiment || ''} ${session?.track || '?'} L${cb.value} (${session?.driver || '?'})`,
      });
      lapIdx++;
    });
  });
  return result;
}

// ---- Channels / Signals ----

function getActiveSignals() {
  return Array.from(document.querySelectorAll('.chip.active')).map(c => c.dataset.signal);
}

function channelLabel(col) {
  const ch = channels[col];
  if (!ch) return col;
  return `${ch.label} ${ch.unit}`;
}

function chartTitle(col) {
  const ch = channels[col];
  if (!ch) return col;
  return `${ch.label} ${ch.unit}`;
}

async function loadChannels() {
  const res = await fetch('/api/channels');
  channels = await res.json();
  renderChannelChips();
}

const MAX_VISIBLE = 8; // chips visible per category before collapsing

function renderChannelChips() {
  const container = document.getElementById('signal-container');
  const groups = {};
  for (const [col, meta] of Object.entries(channels)) {
    const cat = meta.cat || 'Other';
    if (!groups[cat]) groups[cat] = [];
    groups[cat].push(col);
  }

  let html = '';
  for (const cat of CAT_ORDER) {
    const cols = groups[cat];
    if (!cols) continue;
    const collapsed = cols.length > MAX_VISIBLE;
    const catId = cat.replace(/[^a-zA-Z]/g, '');

    html += `<div class="cat-section">`;
    html += `<div class="cat-header">`;
    html += `<span class="cat-label">${cat}</span>`;
    if (collapsed) {
      html += `<button class="cat-toggle" onclick="toggleCat('${catId}', this)">show all ${cols.length}</button>`;
    }
    html += `</div>`;
    html += `<div class="signal-chips" id="cat-${catId}">`;
    for (let i = 0; i < cols.length; i++) {
      const col = cols[i];
      const m = channels[col];
      const active = DEFAULT_ACTIVE.has(col) ? ' active' : '';
      const hidden = collapsed && i >= MAX_VISIBLE ? ' style="display:none" data-extra' : '';
      html += `<span class="chip${active}" data-signal="${col}"${hidden}>${m.label}</span>`;
    }
    html += '</div></div>';
  }
  container.innerHTML = html;

  container.addEventListener('click', e => {
    if (e.target.classList.contains('chip')) e.target.classList.toggle('active');
  });
}

function toggleCat(catId, btn) {
  const chips = document.querySelectorAll(`#cat-${catId} [data-extra]`);
  const showing = chips[0]?.style.display !== 'none';
  chips.forEach(c => c.style.display = showing ? 'none' : '');
  btn.textContent = showing ? `show all` : 'show less';
}

// ---- Overlay (load + plot) ----

async function overlay() {
  const selections = getSelections();
  const signals = getActiveSignals();

  if (!selections.length) { setStatus('Check at least one lap', true); return; }
  if (!signals.length) { setStatus('Select at least one signal', true); return; }

  const btn = document.getElementById('btn-overlay');
  btn.disabled = true;
  setStatus('<span class="loading-spinner"></span> Loading telemetry...');

  try {
    // Fetch all telemetry in parallel
    const allData = await Promise.all(selections.map(sel => {
      const p = keyToParams(sel.key);
      p.set('lap', sel.lap);
      p.set('signals', signals.join(','));
      return fetch('/api/telemetry?' + p)
        .then(r => { if (!r.ok) throw new Error('HTTP ' + r.status); return r.json(); });
    }));

    const chartsDiv = document.getElementById('charts');
    chartsDiv.innerHTML = '';
    plotDivs = [];

    for (let si = 0; si < signals.length; si++) {
      const signal = signals[si];
      const container = document.createElement('div');
      container.className = 'chart-container';
      const plotDiv = document.createElement('div');
      container.appendChild(plotDiv);
      chartsDiv.appendChild(container);
      plotDivs.push(plotDiv);

      const traces = selections.map((sel, i) => {
        const d = allData[i].data;
        const ds = downsample(d.normalizedCarPosition, d[signal]);
        return {
          x: ds.x, y: ds.y,
          type: 'scatter',
          mode: 'lines',
          name: sel.label,
          line: { color: sel.color, width: 1.5 },
          showlegend: si === 0,
        };
      });

      Plotly.newPlot(plotDiv, traces, {
        ...PLOTLY_LAYOUT,
        title: { text: chartTitle(signal), font: { color: '#8892a4', size: 13 } },
        xaxis: {
          ...PLOTLY_LAYOUT.xaxis,
          title: si === signals.length - 1 ? 'Track Position [-]' : undefined,
        },
        yaxis: { ...PLOTLY_LAYOUT.yaxis, title: chartTitle(signal) },
      }, { responsive: true });
    }

    linkXAxes(plotDivs);

    const totalPts = allData.reduce((sum, d) => sum + d.count, 0);
    setStatus(`Loaded ${totalPts.toLocaleString()} points across ${selections.length} trace(s)`);
  } catch (e) {
    setStatus('Error: ' + e.message, true);
  } finally {
    btn.disabled = false;
  }
}

// ---- Utilities ----

function downsample(x, y, maxPoints = 1500) {
  if (!x || x.length <= maxPoints) return { x, y };
  const step = x.length / maxPoints;
  const nx = [], ny = [];
  for (let i = 0; i < maxPoints; i++) {
    const idx = Math.round(i * step);
    nx.push(x[idx]);
    ny.push(y[idx]);
  }
  return { x: nx, y: ny };
}

function linkXAxes(divs) {
  if (divs.length < 2) return;
  let syncing = false;
  divs.forEach((div, i) => {
    div.on('plotly_relayout', evData => {
      if (syncing) return;
      syncing = true;
      const update = {};
      if (evData['xaxis.range[0]'] !== undefined) {
        update['xaxis.range[0]'] = evData['xaxis.range[0]'];
        update['xaxis.range[1]'] = evData['xaxis.range[1]'];
      } else if (evData['xaxis.autorange']) {
        update['xaxis.autorange'] = true;
      }
      if (Object.keys(update).length) {
        requestAnimationFrame(() => {
          divs.forEach((other, j) => {
            if (j !== i) Plotly.relayout(other, update);
          });
          syncing = false;
        });
      } else {
        syncing = false;
      }
    });
  });
}

function setStatus(msg, isError = false) {
  const el = document.getElementById('status');
  el.innerHTML = msg;
  el.className = 'status-bar' + (isError ? ' error' : '');
}

// ---- Init ----
(async () => {
  setStatus('<span class="loading-spinner"></span> Loading...');
  try {
    await Promise.all([fetchSessions(), loadChannels()]);
    addRow();
    setStatus(`${sessions.length} sessions available. Select a session, check laps, then click Plot.`);
  } catch (e) {
    setStatus('Failed to initialize: ' + e.message, true);
  }
})();
</script>
</body>
</html>
