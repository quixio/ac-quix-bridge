name: telemetry-comparison
language: docker
variables:
  - name: QUIX_LAKE_TOKEN
    inputType: Secret
    description: Token to authenticate against QuixLake
    defaultValue: pat
    required: true
  - name: QUIXLAKE_URL
    inputType: FreeText
    description: Base URL of the QuixLake instance
    defaultValue: https://quixlake-quixers-acquixbridge-dev.az-france-0.app.quix.io
  - name: TABLE_NAME
    inputType: FreeText
    description: QuixLake table name for telemetry data
    defaultValue: ac_telemetry
dockerfile: dockerfile
defaultFile: main.py
