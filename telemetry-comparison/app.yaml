name: telemetry-comparison
language: docker
variables:
  # QuixLake URL + auth token are auto-injected by byox as
  # Quix__Lakehouse__Query__Url + Quix__Lakehouse__Query__AuthToken.
  # config.py falls back to legacy QUIXLAKE_URL / QUIX_LAKE_TOKEN for local dev.
  - name: TABLE_NAME
    inputType: FreeText
    description: QuixLake table name for telemetry data
    defaultValue: acc_telemetry
  - name: BLOB_VIDEO_PREFIX
    inputType: FreeText
    description: Blob storage prefix where MP4 recordings + sidecar JSONs are stored
    defaultValue: ac_video
  - name: QUIX_TOKEN
    inputType: Secret
    description: Optional fallback PAT for the Quix AI chat. Normally unset — the chat forwards the logged-in user's Bearer; used only in local dev without auth.
    required: false
    secretKey: pat
  - name: QUIX_AI_AGENT_ID
    inputType: FreeText
    description: Quix AI agent ID for the Lakehouse Querier. Must exist in the target environment's portal.
    defaultValue: a04cfe48-e816-4a66-87af-ac547b7b8137
  - name: TELEMETRY_COMPARISON_MCP_API_KEY
    inputType: Secret
    description: X-API-Key gating the /mcp endpoint (plot_data tool). Must match the key registered for this MCP server on the Lakehouse Querier agent.
    required: true
    secretKey: mcp_api_key
dockerfile: dockerfile
defaultFile: main.py
