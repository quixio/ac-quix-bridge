<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Telemetry Chat</title>
    <link rel="icon" type="image/svg+xml" href="/static/favicon.svg" />
    <link rel="stylesheet" href="/static/style.css" />
    <script
      src="https://cdn.plot.ly/plotly-2.35.2.min.js"
      integrity="sha384-cCVCZkAjYNxaYKbM8lsArLznDF/SvMFr1jcZrvOpSTCa0W40ZAdLzHCEulnUa5i7"
      crossorigin="anonymous"
      charset="utf-8"
    ></script>
  </head>
  <body>
    <div class="app dock-right">
      <header>
        <h1>Telemetry Chat</h1>
        <button id="new-chat" class="ghost" type="button">New chat</button>
        <button id="dock-toggle" class="ghost" type="button" aria-label="Dock chat to bottom">
          <svg
            viewBox="0 0 24 24"
            width="16"
            height="16"
            fill="none"
            stroke="currentColor"
            stroke-width="2"
            stroke-linecap="round"
            stroke-linejoin="round"
            aria-hidden="true"
          >
            <rect x="3" y="4" width="18" height="16" rx="1.5"></rect>
            <line class="dock-indicator-v" x1="15" y1="4" x2="15" y2="20"></line>
            <line class="dock-indicator-h" x1="3" y1="14" x2="21" y2="14"></line>
          </svg>
        </button>
      </header>
      <main id="plot-area">
        <div id="empty-state">
          <p>Ask about your telemetry – plot laps or analyse stats.</p>
          <div class="suggestions">
            <button
              type="button"
              data-prompt="Plot Ludvik throttle for laps 1-3 in VideoSyncFix session 2026-04-17T06:39:45.652Z"
            >
              Plot Ludvik throttle laps 1-3
            </button>
            <button
              type="button"
              data-prompt="Plot Tomas throttle, brake, and speed for laps 1-3 in VideoSyncLaps"
            >
              Tomas throttle, brake, speed laps 1-3
            </button>
            <button
              type="button"
              data-prompt="What's the top speed of each driver in BMW 1M?"
            >
              Top speed by driver
            </button>
            <button
              type="button"
              data-prompt="Best lap times leaderboard for bmw_1m"
            >
              Leaderboard
            </button>
          </div>
        </div>
        <div id="plot-title"></div>
        <div id="plot"></div>
      </main>
      <div
        id="divider"
        role="separator"
        aria-orientation="vertical"
        aria-label="Resize chat"
        tabindex="0"
      ></div>
      <div id="chat-container">
        <section id="messages" role="log" aria-live="polite" aria-label="Chat messages"></section>
        <footer>
          <div class="prompt-wrap">
            <textarea
              id="prompt"
              placeholder="Ask Quix AI…"
              rows="1"
              aria-label="Message"
            ></textarea>
            <button id="send" type="button" aria-label="Send" disabled>
              <svg
                viewBox="0 0 24 24"
                width="18"
                height="18"
                fill="none"
                stroke="currentColor"
                stroke-width="2"
                stroke-linecap="round"
                stroke-linejoin="round"
                aria-hidden="true"
              >
                <line x1="22" y1="2" x2="11" y2="13"></line>
                <polygon points="22 2 15 22 11 13 2 9 22 2"></polygon>
              </svg>
            </button>
          </div>
        </footer>
      </div>
    </div>
    <script type="importmap">
      {
        "imports": {
          "markdown-it": "/static/vendor/markdown-it.js"
        }
      }
    </script>
    <script type="module" src="/static/chat.js"></script>
  </body>
</html>
