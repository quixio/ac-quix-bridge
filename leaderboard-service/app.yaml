name: leaderboard-service
language: python
variables:
  - name: MONGO_USER
    inputType: Secret
    required: true
    defaultValue: MONGO_USER
  - name: MONGO_PASSWORD
    inputType: Secret
    required: true
    defaultValue: MONGO_PASSWORD
  - name: MONGO_HOST
    inputType: FreeText
    required: true
    defaultValue: mongodb
  - name: CONFIG_API_URL
    inputType: FreeText
    required: true
  # Quix__Lakehouse__Query__Url and Quix__Lakehouse__Query__AuthToken are
  # intentionally NOT declared here. On DEV they are auto-injected by Quix
  # Cloud at runtime because the deployment has `blobStorage: bind: true` in
  # `quix.yaml`; declaring them at the app level forces a deploy-time prompt
  # whose wrong manual value silently overrides the auto-injection. On BYOX
  # they ARE declared in the quix.yaml deployment block (BYOX does not
  # auto-inject without the declaration) — same split as best-laps-cache.
  # The lake is used ONLY for the marker-gated cold-start State seed.
  - name: output
    inputType: InputTopic
    description: Kafka topic for raw AC telemetry (ac-telemetry-raw)
    required: true
  - name: session_output
    inputType: InputTopic
    description: Kafka topic for AC session events (ac-telemetry-session)
    required: true
  - name: config_input
    inputType: InputTopic
    description: DCM config events topic (ac-telemetry-config) — declared so the pipeline view shows this service consuming it
    required: true
    defaultValue: ac-telemetry-config
  - name: LEADERBOARD_EVENTS_TOPIC
    inputType: OutputTopic
    description: Internal experiment-keyed events topic for the State-native pipeline (write/read/seed/get_request). One stream_id -> one RocksDB store.
    defaultValue: leaderboard-events
  - name: STATE_CONSUMER_GROUP
    inputType: FreeText
    description: Consumer group for the State-native SDF (distinct from the active-stream consumer's leaderboard-service-ghost-lap group).
    defaultValue: leaderboard-service-state
  - name: LAKE_TABLE
    inputType: FreeText
    defaultValue: ac_telemetry
  - name: LAKE_COL_CURRENT_TIME
    inputType: FreeText
    defaultValue: iCurrentTime
  - name: LAKE_COL_BEST_TIME
    inputType: FreeText
    defaultValue: iBestTime
  - name: LAKE_COL_NORMALIZED_POSITION
    inputType: FreeText
    defaultValue: normalizedCarPosition
  - name: GATE_COUNT
    inputType: FreeText
    defaultValue: "650"
  - name: LOCAL_DEV_MODE
    inputType: FreeText
    defaultValue: "false"
  - name: LIVE_TELEMETRY_ENABLED
    inputType: FreeText
    defaultValue: "true"
  - name: NEXT_PUBLIC_FREEZE_MS
    inputType: FreeText
    description: "Build-time: blue-freeze window ms (baked into UI bundle)"
    defaultValue: "200"
  - name: NEXT_PUBLIC_QUIX_AUTH_TOKEN
    inputType: Secret
    description: "Build-time: standalone-mode fallback PAT baked into UI bundle"
    required: false
dockerfile: dockerfile
runEntryPoint: main.py
defaultFile: main.py
