name: best-laps-cache
language: python
variables:
  - name: output
    inputType: InputTopic
    description: Kafka topic for raw AC telemetry (ac-telemetry-raw)
    required: true
  - name: session_output
    inputType: InputTopic
    description: Kafka topic for AC session events (ac-telemetry-session)
    required: false
  - name: config_input
    inputType: InputTopic
    description: DCM config events topic (ac-telemetry-config)
    required: false
    defaultValue: ac-telemetry-config
  # Quix__Lakehouse__Query__Url / Quix__Lakehouse__Query__AuthToken are NOT
  # declared here. They are auto-injected by Quix Cloud at runtime because the
  # deployment has `blobStorage: bind: true` in `quix.yaml`. Declaring them
  # here forces a deploy-time prompt and a wrong manual value silently
  # overrides the auto-injection (mirror leaderboard-service).
  - name: CONFIG_API_URL
    inputType: FreeText
    description: DCM base URL for session/experiment enrichment
    defaultValue: http://dynamic-configuration-manager
  - name: LAKE_TABLE
    inputType: FreeText
    defaultValue: ac_telemetry_prod
  - name: LAKE_COL_BEST_TIME
    inputType: FreeText
    defaultValue: iBestTime
  - name: RECONCILE_INTERVAL_S
    inputType: FreeText
    defaultValue: "300"
  - name: HTTP_PORT
    inputType: FreeText
    defaultValue: "80"
  - name: CONSUMER_GROUP
    inputType: FreeText
    defaultValue: best-laps-cache
  - name: VALID_LAPS_ONLY
    inputType: FreeText
    description: "When 'true' (default), only AC-valid laps count towards best-lap. When 'false', all finished laps (including invalid) are eligible; uses iLastTime instead of iBestTime."
    defaultValue: "true"
    required: false
dockerfile: dockerfile
runEntryPoint: main.py
defaultFile: main.py
