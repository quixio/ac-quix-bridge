<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Quix AI chat probe</title>
    <script type="importmap">
      {
        "imports": {
          "markdown-it": "https://esm.sh/markdown-it@14.1.0"
        }
      }
    </script>
    <link rel="icon" type="image/svg+xml" href="/static/favicon.svg" />
    <link rel="stylesheet" href="/static/style.css" />
  </head>
  <body>
    <div class="app">
      <aside class="sidebar">
        <div class="sidebar-header">
          <button id="new-chat" class="ghost">+ New chat</button>
          <button id="refresh-sessions" class="ghost" title="Refresh list">↻</button>
        </div>
        <ul id="session-list" class="session-list" aria-label="Previous sessions"></ul>
      </aside>
      <div class="chat">
        <header>
          <h1>Quix AI chat probe</h1>
          <span class="meta">workspace-scoped · SSE proxied</span>
          <span class="session" id="session">no session yet</span>
        </header>
        <main id="log"></main>
        <footer>
          <textarea
            id="input"
            placeholder="Ask the Quix Assistant…  (Enter to send, Shift+Enter for newline)"
          ></textarea>
          <button id="send">Send</button>
        </footer>
      </div>
    </div>
    <script type="module" src="/static/chat.js"></script>
  </body>
</html>
