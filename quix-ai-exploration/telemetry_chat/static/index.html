<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Telemetry Chat</title>
    <link rel="icon" type="image/svg+xml" href="/static/favicon.svg" />
    <link rel="stylesheet" href="/static/style.css" />
    <script src="https://cdn.plot.ly/plotly-2.35.2.min.js" charset="utf-8"></script>
  </head>
  <body>
    <div class="app">
      <header>
        <h1>Telemetry Chat</h1>
        <button id="new-chat" class="ghost" type="button">New chat</button>
        <button id="dock-toggle" class="ghost" type="button" aria-label="Dock chat to right">
          <svg
            viewBox="0 0 24 24"
            width="16"
            height="16"
            fill="none"
            stroke="currentColor"
            stroke-width="2"
            stroke-linecap="round"
            stroke-linejoin="round"
            aria-hidden="true"
          >
            <rect x="3" y="4" width="18" height="16" rx="1.5"></rect>
            <line class="dock-indicator-v" x1="15" y1="4" x2="15" y2="20"></line>
            <line class="dock-indicator-h" x1="3" y1="14" x2="21" y2="14"></line>
          </svg>
        </button>
      </header>
      <main id="plot-area">
        <div id="empty-state">
          <p>Ask me to plot telemetry data from the Quix Lake.</p>
          <div class="suggestions">
            <button type="button" data-prompt="Plot speed for all ludvik's laps in BMW">
              speed – ludvik BMW
            </button>
            <button type="button" data-prompt="Show tyre temps for daniel's last session">
              tyre temps – daniel
            </button>
            <button type="button" data-prompt="Compare throttle across all drivers at Nürburgring">
              throttle – all drivers Nürburgring
            </button>
          </div>
        </div>
        <div id="plot-title"></div>
        <div id="plot"></div>
      </main>
      <div
        id="divider"
        role="separator"
        aria-orientation="horizontal"
        aria-label="Resize chat"
        tabindex="0"
      ></div>
      <div id="chat-container">
        <section id="messages" role="log" aria-live="polite" aria-label="Chat messages"></section>
        <footer>
          <div class="prompt-wrap">
            <textarea
              id="prompt"
              placeholder="Plot me all ludvik's laps in BMW…"
              rows="1"
              aria-label="Message"
            ></textarea>
            <button id="send" type="button" aria-label="Send" disabled>
              <svg
                viewBox="0 0 24 24"
                width="18"
                height="18"
                fill="none"
                stroke="currentColor"
                stroke-width="2"
                stroke-linecap="round"
                stroke-linejoin="round"
                aria-hidden="true"
              >
                <line x1="22" y1="2" x2="11" y2="13"></line>
                <polygon points="22 2 15 22 11 13 2 9 22 2"></polygon>
              </svg>
            </button>
          </div>
        </footer>
      </div>
    </div>
    <script type="module" src="/static/chat.js"></script>
  </body>
</html>
