<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Live Speed &amp; G-Force Dashboard</title>
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { background: #0d0d0d; color: #e0e0e0; font-family: sans-serif; display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; }
    h1 { margin-bottom: 1rem; font-size: 1.4rem; letter-spacing: 0.1em; color: #e8ff00; }
    #chart-container { width: 90vw; max-width: 1200px; height: 60vh; }
    #status { margin-top: 0.75rem; font-size: 0.8rem; color: #888; }

    /* ── Warning light ─────────────────────────────────────────────────────── */
    #warning-light {
      display: inline-flex;
      align-items: center;
      gap: 0.5rem;
      margin-bottom: 0.75rem;
      padding: 0.35rem 0.9rem;
      border-radius: 999px;
      font-size: 0.85rem;
      font-weight: 700;
      letter-spacing: 0.12em;
      border: 2px solid #333;
      background: #1a1a1a;
      color: #555;
      transition: background 0.2s, border-color 0.2s, color 0.2s, box-shadow 0.2s;
      user-select: none;
    }
    #warning-light .dot {
      width: 14px;
      height: 14px;
      border-radius: 50%;
      background: #333;
      transition: background 0.2s, box-shadow 0.2s;
    }
    #warning-light.active {
      background: rgba(220, 20, 20, 0.15);
      border-color: #ff2222;
      color: #ff4444;
      box-shadow: 0 0 12px 3px rgba(255, 30, 30, 0.55);
      animation: pulse-glow 0.8s ease-in-out infinite alternate;
    }
    #warning-light.active .dot {
      background: #ff2222;
      box-shadow: 0 0 8px 3px rgba(255, 30, 30, 0.8);
    }
    @keyframes pulse-glow {
      from { box-shadow: 0 0 8px 2px rgba(255, 30, 30, 0.45); }
      to   { box-shadow: 0 0 18px 6px rgba(255, 30, 30, 0.75); }
    }
  </style>
</head>
<body>
  <h1>&#x26a1; Live Speed &amp; G-Force &#x2014; 30 s Window</h1>
  <div id="warning-light" title="Speed exceeds 200 km/h">
    <span class="dot"></span>
    <span class="label">200+ km/h</span>
  </div>
  <div id="chart-container">
    <canvas id="chart"></canvas>
  </div>
  <div id="status">Connecting…</div>

  <script>
    const MAX_POINTS = 30 * 60;
    const labels = [];
    const speedValues = [];
    const accGxValues = [];

    const ctx = document.getElementById("chart").getContext("2d");
    const chart = new Chart(ctx, {
      type: "line",
      data: {
        labels,
        datasets: [
          {
            label: "Speed (km/h)",
            data: speedValues,
            borderColor: "#ff2222",
            backgroundColor: "rgba(255,34,34,0.08)",
            borderWidth: 2,
            pointRadius: 0,
            tension: 0.2,
            fill: true,
            yAxisID: "ySpeed",
          },
          {
            label: "accG_x (g)",
            data: accGxValues,
            borderColor: "#00d4ff",
            backgroundColor: "rgba(0,212,255,0.05)",
            borderWidth: 2,
            pointRadius: 0,
            tension: 0.2,
            fill: false,
            yAxisID: "yAcc",
          }
        ]
      },
      options: {
        animation: false,
        responsive: true,
        maintainAspectRatio: false,
        plugins: { legend: { labels: { color: "#e0e0e0" } } },
        scales: {
          x: {
            ticks: { color: "#888", maxTicksLimit: 10, maxRotation: 0 },
            grid: { color: "#222" }
          },
          ySpeed: {
            type: "linear",
            position: "left",
            min: 0,
            max: 320,
            title: { display: true, text: "km/h", color: "#ff2222" },
            ticks: { color: "#ff2222" },
            grid: { color: "#222" }
          },
          yAcc: {
            type: "linear",
            position: "right",
            min: -4,
            max: 4,
            title: { display: true, text: "g (accG_x)", color: "#00d4ff" },
            ticks: { color: "#00d4ff" },
            grid: { drawOnChartArea: false }
          }
        }
      }
    });

    function fmt(ts) {
      const d = new Date(ts);
      const hh = String(d.getHours()).padStart(2, "0");
      const mm = String(d.getMinutes()).padStart(2, "0");
      const ss = String(d.getSeconds()).padStart(2, "0");
      const ms = String(Math.floor(d.getMilliseconds() / 100));
      return `${hh}:${mm}:${ss}.${ms}`;
    }

    const warningLight = document.getElementById("warning-light");
    const SPEED_THRESHOLD = 200;

    function updateWarningLight(speed) {
      if (speed > SPEED_THRESHOLD) {
        warningLight.classList.add("active");
      } else {
        warningLight.classList.remove("active");
      }
    }

    function addPoint(t, v, a) {
      labels.push(fmt(t));
      speedValues.push(v);
      accGxValues.push(a !== undefined ? a : null);
      if (labels.length > MAX_POINTS) {
        labels.shift();
        speedValues.shift();
        accGxValues.shift();
      }
      updateWarningLight(v);
      chart.update("none");
    }

    function connect() {
      const proto = location.protocol === "https:" ? "wss" : "ws";
      const ws = new WebSocket(`${proto}://${location.host}/ws`);
      document.getElementById("status").textContent = "Connecting\u2026";

      ws.onopen = () => {
        document.getElementById("status").textContent = "Connected \u2713";
      };

      ws.onmessage = (evt) => {
        const msg = JSON.parse(evt.data);
        if (msg.type === "snapshot") {
          labels.length = 0;
          speedValues.length = 0;
          accGxValues.length = 0;
          msg.data.forEach(p => addPoint(p.t, p.v, p.a));
        } else if (msg.type === "point") {
          addPoint(msg.data.t, msg.data.v, msg.data.a);
        }
      };

      ws.onclose = () => {
        document.getElementById("status").textContent = "Disconnected \u2014 reconnecting\u2026";
        setTimeout(connect, 2000);
      };

      ws.onerror = () => ws.close();
    }

    connect();
  </script>
</body>
</html>
