name: quixlab
language: docker
variables:
  - name: QUIXLAB_NOTEBOOK
    inputType: FreeText
    description: Notebook file to open on startup (leave empty for the file picker)
    defaultValue: main.py
  - name: QUIXLAB_MODE
    inputType: FreeText
    description: "Run mode: 'app' (view only) or 'edit' (full editor)"
    defaultValue: edit
  - name: QUIX_LAKE_TOKEN
    inputType: ProjectVariable
    description: Override token for QuixLake queries. Leave empty to use the platform-injected Quix__Sdk__Token.
    secret: true
dockerfile: dockerfile
defaultFile: dockerfile
libraryItemId: quixlab
