name: AC Post-Race Trigger
language: python
variables:
  - name: input
    inputType: InputTopic
    description: Topic of test-completed events (session-end signals)
    defaultValue: test-completed
    required: true
  - name: TEST_MANAGER_URL
    inputType: FreeText
    description: Test Manager backend URL (in-cluster service name by default)
    defaultValue: http://test-manager-backend
    required: false
dockerfile: dockerfile
runEntryPoint: main.py
defaultFile: main.py
