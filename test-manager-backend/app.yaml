name: backend
language: python
variables:
  - name: MONGO_USER
    inputType: Secret
    multiline: false
    defaultValue: MONGO_USER
    required: true
  - name: MONGO_PASSWORD
    inputType: Secret
    multiline: false
    defaultValue: MONGO_PASSWORD
    required: true
  - name: MONGO_HOST
    inputType: FreeText
    multiline: false
    defaultValue: mongodb
    required: true
  - name: CONFIG_API_URL
    inputType: FreeText
    multiline: false
    required: true
  - name: Quix__Lakehouse__Query__Url
    inputType: FreeText
    multiline: false
    description: Base URL of the Quix Lakehouse Query API (e.g. https://lh-ui-<workspace>.edge.byox.demo)
    required: true
  - name: Quix__Lakehouse__Query__AuthToken
    inputType: Secret
    multiline: false
    description: PAT for the Quix Lakehouse Query API
    required: true
  - name: LAKE_TABLE
    inputType: FreeText
    multiline: false
    defaultValue: ac_telemetry
    description: Lake table the leaderboard queries (e.g. ac_telemetry, ac_telemetry_leaderboard)
  - name: LAKE_COL_CURRENT_TIME
    inputType: FreeText
    multiline: false
    defaultValue: iCurrentTime
    description: Lap-relative current-time column on LAKE_TABLE (e.g. iCurrentTime on ac_telemetry, currentTime on derived tables)
  - name: LAKE_COL_BEST_TIME
    inputType: FreeText
    multiline: false
    defaultValue: iBestTime
    description: Best-lap-time column on LAKE_TABLE (e.g. iBestTime or bestTime)
  - name: LAKE_COL_NORMALIZED_POSITION
    inputType: FreeText
    multiline: false
    defaultValue: normalizedCarPosition
    description: 0..1 normalized position column on LAKE_TABLE
  - name: LOCAL_DEV_MODE
    inputType: FreeText
    multiline: false
    defaultValue: false
  - name: LIVE_TELEMETRY_ENABLED
    inputType: FreeText
    multiline: false
    defaultValue: true
  - name: GATE_COUNT
    inputType: FreeText
    multiline: false
    defaultValue: "650"
    description: Number of checkpoint gates the lap is split into for live sector comparison.
  - name: Quix__Portal__Api
    inputType: FreeText
    multiline: false
    defaultValue: https://portal-api.dev.quix.io
dockerfile: dockerfile
runEntryPoint: main.py
defaultFile: main.py
includedFolders:
  - shared
