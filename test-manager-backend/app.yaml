name: backend
language: python
variables:
  - name: MONGO_USER
    inputType: Secret
    multiline: false
    defaultValue: MONGO_USER
    required: true
  - name: MONGO_PASSWORD
    inputType: Secret
    multiline: false
    defaultValue: MONGO_PASSWORD
    required: true
  - name: MONGO_HOST
    inputType: FreeText
    multiline: false
    defaultValue: mongodb
    required: true
  - name: CONFIG_API_URL
    inputType: FreeText
    multiline: false
    required: true
  - name: QUIXLAKE_URL
    inputType: FreeText
    multiline: false
    defaultValue: https://quixlake-quixdev-quixlakev2-dev.deployments-dev.quix.io
    required: true
  - name: QUIX_LAKE_TOKEN
    inputType: Secret
    multiline: false
    defaultValue: pat_token
    required: true
  - name: TESTMANAGER_MCP_API_KEY
    inputType: Secret
    multiline: false
    description: "Shared X-API-Key secret for /mcp endpoint. Generated by quix-ai-config/scripts/register_mcp.py and stored as a workspace secret."
    defaultValue: TESTMANAGER_MCP_API_KEY
    required: false
  - name: QUIX_AI_POST_RACE_AGENT_ID
    inputType: FreeText
    multiline: false
    description: "ID of the Post-Race Analyzer Quix.AI agent. Output of quix-ai-config/scripts/update_agent.py. Empty value disables the AI runner spawn."
    required: false
dockerfile: dockerfile
runEntryPoint: main.py
defaultFile: main.py
includedFolders:
  - shared
