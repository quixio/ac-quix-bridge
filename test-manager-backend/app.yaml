name: backend
language: python
variables:
  - name: MONGO_USER
    inputType: Secret
    multiline: false
    defaultValue: MONGO_USER
    required: true
  - name: MONGO_PASSWORD
    inputType: Secret
    multiline: false
    defaultValue: MONGO_PASSWORD
    required: true
  - name: MONGO_HOST
    inputType: FreeText
    multiline: false
    defaultValue: mongodb
    required: true
  - name: CONFIG_API_URL
    inputType: FreeText
    multiline: false
    required: true
  - name: LOCAL_DEV_MODE
    inputType: FreeText
    multiline: false
    defaultValue: false
dockerfile: dockerfile
runEntryPoint: main.py
defaultFile: main.py
includedFolders:
  - shared
