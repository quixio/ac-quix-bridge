name: best-laps-lite
language: python
variables:
  - name: output
    inputType: InputTopic
    description: Kafka topic for raw AC telemetry (ac-telemetry-raw)
    required: true
  - name: session_output
    inputType: InputTopic
    description: Kafka topic for AC session events (ac-telemetry-session); source of track/carModel
    required: false
    defaultValue: ac-telemetry-session
  - name: config_input
    inputType: InputTopic
    description: DCM config events topic (ac-telemetry-config); resolves experiment/driver/environment
    required: false
    defaultValue: ac-telemetry-config
  - name: best_time_output
    inputType: OutputTopic
    description: Full-board snapshot emitted on a new/improved best
    required: false
    defaultValue: ac-best-laps
  - name: event_output
    inputType: OutputTopic
    description: Rich per-new-best event topic
    required: false
    defaultValue: ac-best-laps-events
  # byox does NOT auto-inject the Lakehouse Query URL/token (no blobStorage.bind
  # on this target), so declare them here for the cold-start lake seed. On dev
  # they auto-inject; the code accepts either these or the legacy LAKE_API_*
  # fallbacks. See skill quix-rocksdb-state-api (Deployment notes) + memory
  # feedback_incluster_dcm_url / BYOX demo endpoints.
  - name: Quix__Lakehouse__Query__Url
    inputType: FreeText
    description: Lakehouse /query base URL for cold-start seed (byox; declare explicitly)
    required: false
  - name: Quix__Lakehouse__Query__AuthToken
    inputType: Secret
    description: Lakehouse Query bearer token (byox; declare explicitly)
    required: false
  - name: CONFIG_API_URL
    inputType: FreeText
    description: DCM base URL for experiment enrichment
    defaultValue: http://dynamic-configuration-manager
  - name: LAKE_TABLE
    inputType: FreeText
    defaultValue: ac_telemetry_prod
  - name: LAKE_COL_BEST_TIME
    inputType: FreeText
    defaultValue: iBestTime
  - name: HTTP_PORT
    inputType: FreeText
    defaultValue: "80"
  - name: CONSUMER_GROUP
    inputType: FreeText
    defaultValue: best-laps-lite
  - name: Quix__State__Dir
    inputType: FreeText
    description: RocksDB managed-State dir; mount a `state:` volume here for durability
    defaultValue: state
dockerfile: dockerfile
runEntryPoint: main.py
defaultFile: main.py
