<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Track Viewer</title>
    <!-- Bootstrap 5 via CDN (no build step; responsive grid + badges). -->
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
      rel="stylesheet"
      integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH"
      crossorigin="anonymous"
    />
    <style>
      html,
      body {
        height: 100%;
      }
      #sidebar {
        max-height: calc(100vh - 56px);
        overflow-y: auto;
      }
      .layout-row {
        cursor: pointer;
      }
      .layout-row.active {
        background-color: var(--bs-primary-bg-subtle);
      }
      #map-canvas {
        width: 100%;
        height: 70vh;
        background: #0b1020;
        border-radius: 0.5rem;
        display: block;
      }
      .legend-bar {
        height: 12px;
        border-radius: 6px;
        background: linear-gradient(
          to right,
          rgb(220, 40, 40),
          rgb(220, 200, 40),
          rgb(40, 200, 60)
        );
      }
    </style>
  </head>
  <body>
    <nav class="navbar navbar-dark bg-dark px-3">
      <span class="navbar-brand mb-0 h1">Track Viewer</span>
      <span class="navbar-text small text-secondary"
        >Read-only · <code>test_manager.track_layouts</code></span
      >
    </nav>

    <div class="container-fluid">
      <div class="row">
        <!-- Sidebar: scrollable list of track layouts. -->
        <aside id="sidebar" class="col-12 col-md-4 col-lg-3 border-end py-3">
          <div
            id="status-banner"
            class="alert alert-info py-2 small d-none"
            role="alert"
          ></div>
          <div id="layout-list" class="list-group list-group-flush"></div>
        </aside>

        <!-- Main panel: metadata header + canvas map + legend. -->
        <main class="col-12 col-md-8 col-lg-9 py-3">
          <div id="map-header" class="mb-2">
            <h4 id="map-title" class="mb-1 text-muted">Select a layout</h4>
            <div id="map-meta" class="small text-secondary"></div>
            <div id="map-note" class="small text-warning"></div>
          </div>
          <div id="map-message" class="alert alert-secondary d-none"></div>
          <canvas id="map-canvas"></canvas>
          <div class="d-flex align-items-center mt-2" style="max-width: 360px">
            <span class="small text-muted me-2">tight</span>
            <div class="legend-bar flex-grow-1"></div>
            <span class="small text-muted ms-2">straight</span>
          </div>
          <p class="small text-secondary mt-2 mb-0">
            Plotted as raw <code>x</code> (horizontal) vs <code>z</code>
            (vertical) at equal aspect ratio. AC tracks have no universal
            north, so the layout may appear rotated relative to a real-world
            map &mdash; that is expected, not a bug.
          </p>
        </main>
      </div>
    </div>

    <!-- Relative URL so a path-rewriting ingress prefix does not break it. -->
    <script src="./static/app.js"></script>
  </body>
</html>
