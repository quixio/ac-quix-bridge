name: AC Video Streaming
language: python
variables:
  - name: output
    inputType: OutputTopic
    description: Kafka topic for video frame streaming
    defaultValue: ac-video-frames
    required: true
  - name: session_input
    inputType: InputTopic
    description: Topic from ac-telemetry-source carrying the canonical session_id to adopt
    defaultValue: ac-telemetry-session
    required: true
  - name: VIDEO_DISPLAY_INDEX
    inputType: FreeText
    description: Display index for screen capture (0 = primary)
    defaultValue: 0
    required: false
  - name: VIDEO_FPS
    inputType: FreeText
    description: Capture and recording FPS. Default 15 — typical AC machines can't sustain 30 alongside the game; the per-lap remux corrects timing if actual rate diverges, but lower target = smoother playback.
    defaultValue: 15
    required: false
  - name: STREAM_FPS
    inputType: FreeText
    description: FPS for Kafka frame streaming (lower than VIDEO_FPS)
    defaultValue: 15
    required: false
  - name: VIDEO_OUTPUT_DIR
    inputType: FreeText
    description: Directory to save per-lap MP4 recordings
    defaultValue: ./recordings
    required: false
  - name: VIDEO_RECORDING_ENABLED
    inputType: FreeText
    description: Enable MP4 recording (true/false)
    defaultValue: true
    required: false
  - name: VIDEO_STREAM_ENABLED
    inputType: FreeText
    description: Enable Kafka frame streaming (true/false)
    defaultValue: true
    required: false
  - name: STREAM_WIDTH
    inputType: FreeText
    description: Max width for streamed frames (height scales proportionally)
    defaultValue: 1280
    required: false
  - name: JPEG_QUALITY
    inputType: FreeText
    description: JPEG compression quality for streamed frames (1-100)
    defaultValue: 75
    required: false
  - name: BLOB_VIDEO_PREFIX
    inputType: FreeText
    description: Blob storage path prefix for MP4 uploads
    defaultValue: ac_video
    required: false
  - name: RECORDING_WIDTH
    inputType: FreeText
    description: Cap recording width in pixels (height scales proportionally). 0 = inherit captured screen resolution.
    defaultValue: 1920
    required: false
  - name: SIDECAR_SAMPLE_HZ
    inputType: FreeText
    description: Frequency at which sidecar JSON samples wall_ms + normPos for video<->telemetry sync
    defaultValue: 5
    required: false
dockerfile: dockerfile
runEntryPoint: main.py
defaultFile: main.py
