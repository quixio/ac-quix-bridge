<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AC Telemetry — Leaderboard</title>

<!--
  Standalone leaderboard board. Reachable at /leaderboard.html.

  Shows the all-time fastest-lap-per-driver standings (from the same Data Lake
  -backed /leaderboard proxy the SciChart preview uses) laid out as a big wall
  board: 4 columns × up to 22 drivers each (88 total). The current driver's
  session-best lap (from the /ws feed) updates their row live and is highlighted.

  No charts, no wheel — just the board. The leaderboard row markup + styling are
  ported from scichart.html so it reads identically.
-->

<style>
  :root {
    --bg: #08080f;
    --card: #12121f;
    --border: #23233f;
    --text: #f0f0f5;
    --dim: #6a6a85;
    --cyan: #00d4ff;
    --green: #00ff88;
    --amber: #ffaa00;
    --red: #ff3355;
    --purple: #c14bff;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body { height: 100%; }
  body {
    font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
    background: var(--bg);
    color: var(--text);
    height: 100vh;
    display: flex;
    flex-direction: column;
    padding: 1vh 1vw;
    gap: 1vh;
    overflow: hidden;
    font-variant-numeric: tabular-nums;
  }

  /* ---------- Top bar (ported from scichart.html) ---------- */
  .topbar {
    flex-shrink: 0;
    display: flex;
    align-items: center;
    gap: 1.4vw;
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 1vh 1.4vw;
  }
  .brand-logo { height: 3.4vh; width: auto; display: block; flex-shrink: 0; }
  .title { font-size: 2.2vh; font-weight: 800; white-space: nowrap; }
  .title small { color: var(--dim); font-weight: 600; font-size: 1.4vh; }
  .spacer { flex: 1; }
  .driver-block { display: flex; flex-direction: column; align-items: center; gap: .3vh; }
  .driver-label { font-size: 1.2vh; font-weight: 700; letter-spacing: .12vw; text-transform: uppercase; color: var(--dim); }
  .driver { font-size: 2.8vh; font-weight: 800; line-height: 1; white-space: nowrap; text-transform: capitalize; }
  .src {
    display: flex; align-items: center; gap: .6vw;
    padding: .7vh 1vw; border-radius: 7px; border: 1.5px solid var(--border);
    font-size: 1.4vh; font-weight: 800; letter-spacing: .08vw; white-space: nowrap;
  }
  .src .dot { width: 1.1vh; height: 1.1vh; border-radius: 50%; background: var(--dim); }
  .src.live .dot { background: var(--green); animation: blink 1.1s ease-in-out infinite; }
  .src.demo .dot { background: var(--amber); }
  .src.waiting .dot { background: var(--amber); animation: blink 1.1s ease-in-out infinite; }
  @keyframes blink { 0%, 100% { opacity: 1; } 50% { opacity: .2; } }
  .src .hz { color: var(--dim); font-weight: 600; }

  /* ---------- Board: up to 4 columns of 22 drivers ---------- */
  .board {
    flex: 1; min-height: 0;
    background: var(--card); border: 1px solid var(--border); border-radius: 10px;
    padding: 1.2vh 1.2vw;
    display: grid;
    grid-template-columns: repeat(var(--cols, 4), 1fr);
    gap: 0 1.6vw;
    overflow: hidden;
  }
  .lb-col { display: flex; flex-direction: column; gap: .35vh; min-width: 0; min-height: 0; }

  /* ---------- Leaderboard rows (ported from scichart.html) ---------- */
  .lb-row {
    display: grid; grid-template-columns: 2.4vw 1fr auto; align-items: center;
    gap: .7vw; padding: .25vh .5vw; border-radius: 5px; min-width: 0;
  }
  .lb-row .lb-pos { font-size: 1.5vh; font-weight: 800; color: var(--dim); text-align: center; }
  .lb-namewrap { min-width: 0; }
  .lb-row .lb-name { font-size: 1.7vh; font-weight: 700; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; text-transform: capitalize; }
  .lb-row .lb-time { font-size: 1.6vh; font-weight: 800; color: var(--cyan); display: inline-flex; align-items: baseline; justify-content: flex-end; gap: .45vw; }
  .lb-timewrap { display: flex; flex-direction: column; align-items: flex-end; gap: .15vh; }
  .lb-deltas { display: flex; gap: .6vw; font-size: 1.1vh; font-weight: 700; line-height: 1; font-variant-numeric: tabular-nums; }
  .lb-gap-leader { color: #9aa0c0; }      /* gap to P1 (overall standing) */
  .lb-gap-ahead { color: var(--cyan); }   /* interval to the driver directly ahead */
  /* Top-3 podium tint on the position number. */
  .lb-row.p1 .lb-pos { color: #ffd34d; }
  .lb-row.p2 .lb-pos { color: #cfd3e0; }
  .lb-row.p3 .lb-pos { color: #e0894d; }
  /* Current driver's row. */
  .lb-row.me { background: #1c1c30; }
  .lb-row.me .lb-pos, .lb-row.me .lb-name { color: var(--text); }
  /* Live telemetry blink dot before the current driver's time. */
  .lb-live { align-self: center; width: .9vh; height: .9vh; border-radius: 50%; background: var(--green); box-shadow: 0 0 .9vh var(--green); flex-shrink: 0; }
  /* "HOT LAP" caption under the name on the current driver's live projected row. */
  .lb-hot { font-size: 1vh; font-weight: 800; letter-spacing: .1vw; text-transform: uppercase; color: var(--amber); line-height: 1; margin-top: .15vh; }
  /* The current driver's live in-progress (projected) lap — amber + italic, distinct
     from their settled best (cyan). Re-sorts every frame as the estimate evolves. */
  .lb-time.live-lap { color: var(--amber); font-style: italic; }
  /* New personal-best lap: time goes purple and blinks for ~4s, then stays purple. */
  .lb-time.flash { color: var(--purple); animation: lbflash .5s ease-in-out 8; }
  @keyframes lbflash { 0%, 100% { opacity: 1; } 50% { opacity: .15; } }
  .lb-empty { flex: 1; }   /* fills the column so short boards stay top-aligned */
</style>
</head>
<body>

<!-- ===================== TOP BAR ===================== -->
<div class="topbar">
  <svg class="brand-logo" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 438.16 132" aria-label="Quix"><g><rect x="108" y="108" width="24" height="24" rx="2.5" ry="2.5" fill="#fff"/><rect x="81" y="81" width="24" height="24" rx="2.5" ry="2.5" fill="#fff"/><rect x="54" y="54" width="24" height="24" rx="2.5" ry="2.5" fill="#fff"/><path d="M129.5,0H2.5C1.12,0,0,1.12,0,2.5v127c0,1.38,1.12,2.5,2.5,2.5h73c1.38,0,2.5-1.12,2.5-2.5v-19c0-1.38-1.12-2.5-2.5-2.5H24V24h84v51.5c0,1.38,1.12,2.5,2.5,2.5h19c1.38,0,2.5-1.12,2.5-2.5V2.5c0-1.38-1.12-2.5-2.5-2.5Z" fill="#fff"/><polygon points="410.55 66.29 437.18 31.38 417.48 31.38 401.65 53.85 386.24 31.38 366.11 31.38 391.98 65.79 363.16 103.15 382.72 103.15 400.81 78.13 418.04 103.15 438.16 103.15 410.55 66.29" fill="#fff"/><rect x="339.47" y="31.38" width="17.73" height="71.77" fill="#fff"/><rect x="338.62" width="19.28" height="19.56" fill="#fff"/><path d="M310.63,70.08c0,3.85-.84,7.32-2.53,10.41-1.59,3-3.8,5.35-6.61,7.04-2.72,1.69-5.91,2.53-9.57,2.53-4.03,0-7.18-1.13-9.43-3.38-2.16-2.25-3.24-5.58-3.24-9.99V31.38h-17.73v48.97c0,4.6.94,8.73,2.81,12.38,1.97,3.66,4.74,6.57,8.3,8.73,3.66,2.06,7.97,3.1,12.95,3.1,6.29,0,11.73-1.55,16.32-4.64,3.94-2.68,7-6.13,9.29-10.27v13.5h17.31V31.38h-17.87v38.7Z" fill="#fff"/><path d="M233.22,43.85c-1.42-3.64-3.7-6.64-6.9-8.95-4.41-3.28-9.99-4.93-16.75-4.93s-12.34,1.55-17.31,4.64c-4.88,3.1-8.68,7.46-11.4,13.09-2.72,5.63-4.08,12.24-4.08,19.84s1.31,14.03,3.94,19.56c2.63,5.54,6.33,9.85,11.12,12.95,4.88,3,10.6,4.5,17.17,4.5s12.06-1.55,16.75-4.64c3.07-2.08,5.31-4.66,6.9-7.62v39.71h17.87V31.38h-17.31v12.47ZM228.01,84.15c-3.38,3.94-7.97,5.91-13.79,5.91s-10.55-1.97-13.93-5.91c-3.38-3.94-5.07-9.52-5.07-16.75s1.69-12.81,5.07-16.75c3.38-4.03,7.97-6.05,13.79-6.05s10.41,1.97,13.79,5.91c3.47,3.94,5.21,9.52,5.21,16.75s-1.69,12.85-5.07,16.89Z" fill="#fff"/></g></svg>

  <div class="title">Leaderboard <small>fastest lap per driver</small></div>

  <div class="spacer"></div>

  <div class="driver-block">
    <span class="driver-label">Current driver</span>
    <div class="driver" id="driver-name"></div>
  </div>

  <div class="spacer"></div>

  <div class="src" id="src">
    <span class="dot"></span><span id="src-label">starting…</span><span class="hz" id="hz"></span>
  </div>
</div>

<!-- ===================== BOARD ===================== -->
<div class="board" id="board"></div>

<script>
// ============================================================
//  Leaderboard board — fastest lap per driver.
//  Data: the /leaderboard proxy (Data Lake) for the standings, plus the live
//  /ws feed for the current driver's session-best lap. No charts here.
// ============================================================
const now = () => performance.now();
const INT_MAX = 2147483647;          // AC's "no time set" sentinel
const PER_COL = 22;                  // drivers per column
const COLS = 4;                      // columns on the board
const MAX_ROWS = PER_COL * COLS;     // 88
const LB_POLL_MS = 20000;

const boardEl = document.getElementById('board');
const driverEl = document.getElementById('driver-name');
boardEl.style.setProperty('--cols', String(COLS));

// Current driver: ?driver= URL param → live frame's driverName → {type:"driver"} WS msg.
let driverName = new URLSearchParams(location.search).get('driver') || '';
function setDriver(name) {
  const norm = (s) => (s || '').trim().toLowerCase();
  if (name && norm(name) !== norm(driverName)) {
    const url = new URL(location.href);
    url.searchParams.set('driver', name);
    location.replace(url.toString());
    return;
  }
  driverName = name;
  driverEl.textContent = name;
}
setDriver(driverName);

// --- Demo standings: a full 88-driver board so the page reads as a wall display
// even with no lake configured. ?demo=1 forces it; otherwise real rows replace it.
const DEMO_NAMES = [
  'Tomas','Mika','Sergio','Elena','Dan','Yuki','Carlos','Lena','Omar','Priya',
  'Nora','Hugo','Ivan','Sara','Leo','Mei','Kai','Ana','Theo','Iris',
  'Noah','Vera','Finn','Zara','Otto','Lina','Marco','Tessa','Ravi','Gita',
  'Bram','Sofia','Nils','Aria','Pavel','Maya','Lukas','Nina','Dario','Emma',
  'Ricky','Lola','Sven','Kira','Diego','Anya','Felix','Suki','Joel','Romy',
  'Axel','Cleo','Boris','Greta','Milan','Heidi','Ezra','Juno','Cato','Wren',
  'Niko','Liv','Caleb','Inez','Remy','Dora','Hans','Bea','Igor','Faye',
  'Cruz','Esme','Reed','Tilly','Otis','Vida','Knox','Sage','Beau','Cora',
  'Enzo','Mira','Rolf','Lia','Pim','Suze','Gus','Bo',
];
function makeDemo() {
  // Pole at 1:22.4, then a believable spread out to ~1:29.
  let ms = 82418;
  return DEMO_NAMES.slice(0, MAX_ROWS).map((name, i) => {
    if (i > 0) ms += 120 + Math.round((Math.sin(i * 1.7) + 1) * 240) + i * 6;
    return { name, ms };
  });
}

const demoParam = new URLSearchParams(location.search).get('demo');
const forceDemo = demoParam !== null && demoParam !== '0' && demoParam.toLowerCase() !== 'false';
// In demo mode, attach the live "hot lap" to a driver already on the board so the
// preview shows their row climbing/sliding (matches the SciChart page's behaviour).
if (forceDemo && !driverName) { driverName = 'Tomas'; driverEl.textContent = 'Tomas'; }

let LEADERBOARD = makeDemo();        // seeded so the board is never blank
let usingDemo = true;
let lastBestMs = null;               // current driver's session-best (from /ws)
let liveLapMs = null;                // current driver's live projected/current lap (null = none)
let lbFlashUntil = 0;                // flash the driver's best row purple after a new PB
let lbLiveUntil = 0;                 // show the live row + blink dot while telemetry is fresh
let lbLastOrder = '', lbLastRender = 0;   // render throttle: on order change or ~5 Hz
let posSessionId = null;

function fmtLap(ms) {
  if (!ms || ms <= 0 || ms >= INT_MAX) return '--:--.---';
  const m = Math.floor(ms / 60000), s = Math.floor((ms % 60000) / 1000), mm = ms % 1000;
  return m + ':' + String(s).padStart(2, '0') + '.' + String(mm).padStart(3, '0');
}
const fmtGap = (ms) => '+' + (ms / 1000).toFixed(3);

// Combine the settled best laps (LEADERBOARD) with the current driver's live
// in-progress row — a second entry for the same driver, ranked by its own
// (projected/current) time — shown only while telemetry is fresh and the lap is
// valid. Re-sorting it every render is what makes their position climb on a hot
// lap and slide back on a slow one.
function buildRows() {
  const rows = LEADERBOARD.map(r => ({ name: r.name, ms: r.ms, live: false }));
  if (driverName && now() < lbLiveUntil && liveLapMs != null) {
    rows.push({ name: driverName, ms: liveLapMs, live: true });
  }
  rows.sort((a, b) => a.ms - b.ms);
  return rows.slice(0, MAX_ROWS);
}

function rowHtml(r, i, leaderMs, prevMs, me, flashMe) {
  const isMe = me && r.name.toLowerCase() === me;
  // Live row: amber italic "~time" + green blink dot + "HOT LAP" caption. Only a
  // settled best row (not the live row) can flash purple on a new PB.
  const timeCls = 'lb-time' + (r.live ? ' live-lap' : (isMe && flashMe ? ' flash' : ''));
  const podium = i === 0 ? ' p1' : i === 1 ? ' p2' : i === 2 ? ' p3' : '';
  const deltas = i === 0 ? '' :
    '<div class="lb-deltas">' +
      '<span class="lb-gap-leader">' + fmtGap(r.ms - leaderMs) + '</span>' +
      '<span class="lb-gap-ahead">' + fmtGap(r.ms - prevMs) + '</span>' +
    '</div>';
  return '<div class="lb-row' + podium + (isMe ? ' me' : '') + '">' +
    '<div class="lb-pos">' + (i + 1) + '</div>' +
    '<div class="lb-namewrap">' +
      '<div class="lb-name">' + r.name + '</div>' +
      (r.live ? '<div class="lb-hot">Hot Lap</div>' : '') +
    '</div>' +
    '<div class="lb-timewrap">' +
      '<div class="' + timeCls + '">' +
        (r.live ? '<span class="lb-live"></span>~' : '') + fmtLap(r.ms) +
      '</div>' + deltas +
    '</div>' +
  '</div>';
}

function renderBoard() {
  const me = (driverName || '').toLowerCase();
  const flashMe = now() < lbFlashUntil;
  const rows = buildRows();
  const leaderMs = rows.length ? rows[0].ms : 0;
  let html = '';
  for (let c = 0; c < COLS; c++) {
    const start = c * PER_COL;
    const slice = rows.slice(start, start + PER_COL);
    if (!slice.length && c > 0) break;   // don't render empty trailing columns
    html += '<div class="lb-col">' +
      slice.map((r, j) => {
        const i = start + j;
        return rowHtml(r, i, leaderMs, i > 0 ? rows[i - 1].ms : leaderMs, me, flashMe);
      }).join('') +
      '<div class="lb-empty"></div></div>';
  }
  boardEl.innerHTML = html;
}
renderBoard();

// --- Current driver, from the /ws feed: settled best row + live projected row. ---
function updateFromFrame(d) {
  if (d.session_id !== posSessionId) { posSessionId = d.session_id; lastBestMs = null; lbFlashUntil = 0; }

  // Entry #1 — settled best lap. Track the session best (AC's iBestTime) and fold it
  // into the board row, flashing purple only when the shown time genuinely improves.
  const best = (typeof d.iBestTime === 'number' && d.iBestTime > 0 && d.iBestTime < INT_MAX) ? d.iBestTime : null;
  if (best !== null && (lastBestMs === null || best < lastBestMs)) lastBestMs = best;
  const name = (driverName || '').trim();
  if (name && lastBestMs !== null) {
    const row = LEADERBOARD.find(r => r.name.toLowerCase() === name.toLowerCase());
    if (row) { if (lastBestMs < row.ms) { row.ms = lastBestMs; lbFlashUntil = now() + 4000; } }
    else LEADERBOARD.push({ name, ms: lastBestMs });
    LEADERBOARD.sort((a, b) => a.ms - b.ms);
  }

  // Entry #2 — the live in-progress lap: AC's projected time (best + live delta) while
  // the current lap is valid. No projection (first lap / invalid) ⇒ no live row.
  const lapValid = d.isValidLap !== 0;   // 0 = invalidated; 1 or missing = valid
  const est = (typeof d.iEstimatedLapTime === 'number' && d.iEstimatedLapTime > 0 && d.iEstimatedLapTime < INT_MAX) ? d.iEstimatedLapTime : null;
  liveLapMs = (lapValid && est !== null) ? est : null;
  lbLiveUntil = now() + 2000;            // live row + blink dot shown while telemetry is fresh

  // Re-render on an order change immediately; otherwise throttle to ~5 Hz so ms digits
  // stay readable. '*' tags the live row so a change in its time alone still refreshes.
  const order = buildRows().map(r => (r.live ? '*' : '') + r.name).join('|');
  const tn = now();
  if (order !== lbLastOrder || tn - lbLastRender > 200) {
    lbLastOrder = order; lbLastRender = tn; renderBoard();
  }
}

// --- Poll the /leaderboard proxy. Replaces the demo board with real standings;
// folds in the current driver's live best so their row stays accurate. ---
async function pollLeaderboard() {
  try {
    const res = await fetch('/leaderboard', { cache: 'no-store' });
    if (!res.ok) return;
    const j = await res.json();
    if (!Array.isArray(j.rows) || !j.rows.length) return;   // keep demo/last board
    LEADERBOARD = j.rows.map(r => ({ name: r.name, ms: r.ms }));
    usingDemo = false;
    if (lastBestMs != null) {
      const me = (driverName || '').trim();
      const mine = LEADERBOARD.find(r => r.name.toLowerCase() === me.toLowerCase());
      if (mine) { if (lastBestMs < mine.ms) mine.ms = lastBestMs; }
      else if (me) LEADERBOARD.push({ name: me, ms: lastBestMs });
    }
    LEADERBOARD.sort((a, b) => a.ms - b.ms);
    renderBoard();
  } catch { /* keep current board */ }
}
if (!forceDemo) { setInterval(pollLeaderboard, LB_POLL_MS); pollLeaderboard(); }

// --- Demo telemetry: a synthetic hot lap for the current driver so ?demo=1 shows
// their live row climbing and sliding around the board, just like real /ws frames.
const t0 = now();
function demoFrame(t) {
  return {
    session_id: 'demo',
    iBestTime: 82418,                                   // their settled best (= board pole)
    iEstimatedLapTime: 82418 + Math.round(Math.sin(t * 0.3) * 2400),  // projected, swings ±2.4 s
    isValidLap: 1,
  };
}

// --- Source indicator + live-dot blink, on the shared wall clock. ---
const srcEl = document.getElementById('src');
const srcLabel = document.getElementById('src-label');
const hzEl = document.getElementById('hz');
let lastLive = -1e9;
function setSource(state) { srcEl.className = 'src ' + state; srcLabel.textContent = state.toUpperCase(); }

function tick() {
  const tn = now();
  if (forceDemo) updateFromFrame(demoFrame((tn - t0) / 1000));   // drive the synthetic hot lap
  const liveRecent = tn - lastLive < 2500;
  const state = forceDemo ? 'demo' : liveRecent ? 'live' : (usingDemo ? 'demo' : 'waiting');
  setSource(state);
  hzEl.textContent = usingDemo ? '· sample data' : '';
  // Blink the current driver's live dot in sync with the status LED (1.1s).
  const liveDot = boardEl.querySelector('.lb-live');
  if (liveDot) liveDot.style.opacity = (0.6 + 0.4 * Math.cos((tn / 1100) * 2 * Math.PI)).toFixed(3);
  requestAnimationFrame(tick);
}
tick();

// --- WebSocket: same envelope contract as the dashboard. ---
function connect() {
  const proto = location.protocol === 'https:' ? 'wss:' : 'ws:';
  const ws = new WebSocket(proto + '//' + location.host + '/ws');
  ws.onmessage = (e) => {
    let msg;
    try { msg = JSON.parse(e.data); } catch { return; }
    if (msg && msg.type === 'status') return;
    if (msg && msg.type === 'driver') { if (msg.name) setDriver(msg.name); return; }
    lastLive = now();
    updateFromFrame(msg);
  };
  ws.onclose = () => setTimeout(connect, 2000);
  ws.onerror = () => ws.close();
}
connect();
</script>
</body>
</html>
