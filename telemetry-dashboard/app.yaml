name: Telemetry Dashboard
language: python
variables:
  - name: input
    inputType: InputTopic
    description: Kafka topic to consume telemetry from
    defaultValue: ac-telemetry-raw
    required: true
  - name: LEADERBOARD_SQL
    inputType: FreeText
    multiline: true
    description: SQL for the leaderboard. Must return columns name, ms (lap time in ms), sorted fastest-first. Defaults to all-time fastest lap per driver from ac_telemetry.
    defaultValue: ""
    required: false
  - name: LEADERBOARD_TTL_SECONDS
    inputType: FreeText
    description: Server-side cache TTL for the leaderboard query (seconds)
    defaultValue: "15"
    required: false
  - name: DATALAKE_API_URL
    inputType: FreeText
    multiline: true
    description: SQL for the leaderboard. Must return columns name, ms (lap time in ms), sorted fastest-first. Defaults to all-time fastest lap per driver from ac_telemetry.
    defaultValue: "https://quixlake-api-demo-quixlake-prod.edge.byox.demo"
    required: false
dockerfile: dockerfile
runEntryPoint: main.py
defaultFile: main.py
