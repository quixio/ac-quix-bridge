# Quix Project Descriptor
# This file describes the data pipeline and configuration of resources of a Quix Project.

metadata:
  version: 1.0

# This section describes the Deployments of the data pipeline
deployments:
  - name: Telemetry Dashboard
    application: telemetry-dashboard
    version: latest
    deploymentType: Service
    resources:
      limits:
        cpu: 200
        memory: 500
      replicas: 1
    publicAccess:
      enabled: true
      urlPrefix: telemetrydashboard
    network:
      ports:
        - port: 80
          targetPort: 80
    variables:
      - name: input
        inputType: InputTopic
        description: Kafka topic to consume telemetry from
        required: true
        value: ac-telemetry-raw
      - name: config_input
        inputType: InputTopic
        description: Config topic to resolve the current driver from (DCM change events)
        required: true
        value: ac-telemetry-config
      - name: session_input
        inputType: InputTopic
        description: Session topic to resolve the current track + car from (ac-telemetry-session)
        required: true
        value: ac-telemetry-session
      - name: CONFIG_MANAGER_URL
        inputType: FreeText
        description: DCM base URL for fetching config content. Leave blank to use the contentUrl carried in each event.
        value: https://config-api-svc-demo-simrigtelemetry-prod.edge.byox.demo
      - name: BEST_LAPS_CACHE_URL
        inputType: FreeText
        description: Base URL of the best-laps-cache service serving GET /best-laps. In-cluster default is http://best-laps-cache. Sole source for the leaderboard standings.
        value: http://best-laps-cache
      - name: LEADERBOARD_TTL_SECONDS
        inputType: FreeText
        description: Server-side cache TTL for the leaderboard query (seconds)
        value: 30
    blobStorage:
      bind: true
  - name: MongoDB
    group: Test Manager
    application: mongodb
    version: latest
    deploymentType: Service
    resources:
      limits:
        cpu: 200
        memory: 800
      replicas: 1
    state:
      enabled: true
      size: 3
    network:
      serviceName: mongodb
      ports:
        - port: 27017
          targetPort: 27017
    variables:
      - name: MONGO_INITDB_ROOT_USERNAME
        inputType: FreeText
        description: The root username to initialize MongoDB with
        required: true
        value: admin
      - name: MONGO_INITDB_ROOT_PASSWORD
        inputType: ProjectVariable
        description: The root password to initialize MongoDB with
        required: true
        secret: true
        variableKey: MONGO_PASSWORD
  - name: Session Config Bridge
    group: Ingestion
    application: session-config-bridge
    version: latest
    deploymentType: Service
    resources:
      limits:
        cpu: 200
        memory: 300
      replicas: 1
    variables:
      - name: input
        inputType: InputTopic
        description: Topic to consume AC session data from
        required: true
        value: ac-telemetry-session
      - name: CONFIG_MANAGER_URL
        inputType: FreeText
        description: URL of the Dynamic Configuration Manager API
        required: true
        value: http://dynamic-configuration-manager
      - name: CONFIG_TYPE
        inputType: FreeText
        description: Config type for session data
        required: true
        value: session
      - name: TEST_MANAGER_URL
        inputType: FreeText
        description: Test Manager backend URL (in-cluster service name by default)
        value: http://test-manager-backend
  - name: AC Post-Race Trigger
    group: Ingestion
    application: ac-postrace-trigger
    version: latest
    deploymentType: Service
    resources:
      limits:
        cpu: 200
        memory: 300
      replicas: 1
    variables:
      - name: input
        inputType: InputTopic
        description: Topic of test-completed events (session-end signals)
        required: true
        value: test-completed
      - name: TEST_MANAGER_URL
        inputType: FreeText
        description: Test Manager backend URL (in-cluster service name by default)
        value: http://test-manager-backend
      - name: TRIGGER_SECRET
        inputType: ProjectVariable
        description: Optional shared secret proving auto-analysis POSTs come from this service. Must match the Test Manager backend's TRIGGER_SECRET. Unset = gate disabled.
        secret: true
        variableKey: TRIGGER_SECRET
    disabled: true
  - name: Dynamic Configuration Manager
    group: Ingestion
    application: DynamicConfiguration
    version: latest
    deploymentType: Managed
    resources:
      limits:
        cpu: 500
        memory: 1000
      replicas: 1
    publicAccess:
      enabled: true
      urlPrefix: config-api-svc
    network:
      serviceName: dynamic-configuration-manager
    configuration:
      topic: ac-telemetry-config
      mongoHost: mongodb
      mongoPort: 27017
      mongoUser: admin
      mongoPasswordSecret: MONGO_PASSWORD
      mongoDatabase: ac_telemetry
      mongoCollection: experiment_configs
    plugin:
      embeddedView:
        enabled: true
        default: true
  - name: AC Telemetry Lake sink
    group: Ingestion
    application: ac-telemetry-lake
    version: latest
    deploymentType: Service
    resources:
      limits:
        cpu: 1000
        memory: 4000
      replicas: 1
    variables:
      - name: input
        inputType: InputTopic
        description: Name of the Kafka input topic to consume from
        required: true
        value: ac-telemetry-raw
      - name: config_topic
        inputType: InputTopic
        description: Dynamic Configuration Manager topic for enrichment
        required: true
        value: ac-telemetry-config
      - name: TABLE_NAME
        inputType: ProjectVariable
        description: Lakehouse table this sink WRITES. Per-environment project variable (e.g. ac_telemetry_dev / ac_telemetry_nurem / ac_telemetry_prod). Every lake reader (Telemetry Explorer, leaderboard-service, Telemetry Dashboard) must resolve the SAME value for that environment. Required — if unset the sink silently falls back to the input topic name (ac-telemetry-raw) and readers query ac_telemetry, splitting writes from reads.
        required: true
        variableKey: AC_TELEMETRY_TABLE_NAME
      - name: HIVE_COLUMNS
        inputType: FreeText
        description: Comma-separated list of columns for Hive partitioning. Include year/month/day/hour to extract from TIMESTAMP_COLUMN (e.g., location,year,month,day,sensor_type)
        value: environment,test_rig,experiment,driver,track,carModel,session_id,lap
      - name: TIMESTAMP_COLUMN
        inputType: FreeText
        description: Column containing timestamp values to extract year/month/day/hour from
        value: timestamp_ms
      - name: AUTO_DISCOVER
        inputType: Options
        description: Automatically register table in REST Catalog on first write
        value: true
      - name: CATALOG_NAMESPACE
        inputType: FreeText
        description: Catalog namespace for table registration
        value: default
      - name: BATCH_SIZE
        inputType: FreeText
        description: Number of messages to batch before writing to storage
        value: 10000
      - name: COMMIT_INTERVAL
        inputType: FreeText
        description: Kafka commit interval in seconds
        value: 30
      - name: KAFKA_KEY_DESERIALIZER
        inputType: FreeText
        description: The key deserializer to use
        value: str
      - name: KAFKA_VALUE_DESERIALIZER
        inputType: FreeText
        description: the value deserializer to use
        value: json
      - name: CONSUMER_GROUP
        inputType: FreeText
        description: Kafka consumer group name
        value: s3_direct_sink_v1.7
      - name: AUTO_OFFSET_RESET
        inputType: Options
        description: Where to start consuming if no offset exists
        value: earliest
      - name: LOGLEVEL
        inputType: Options
        description: Application logging level
        value: INFO
      - name: MAX_WRITE_WORKERS
        inputType: FreeText
        description: How many files can be written in parallel to storage at once (based on partitioning + batch size)
        value: 10
      - name: STREAM_TIMEOUT_MS
        inputType: FreeText
        description: Per-key silence threshold in milliseconds. When a Kafka message key has not published for this duration, a warning is logged (sensor drop-out detection). Leave empty to disable.
        value: 10000
      - name: TEST_COMPLETED_TOPIC
        inputType: OutputTopic
        description: Topic to publish test-completed events when a stream key goes silent
        value: test-completed
    blobStorage:
      bind: true
    disabled: true
  - name: Test Manager - Backend
    group: Test Manager
    application: test-manager-backend
    version: latest
    deploymentType: Service
    resources:
      limits:
        cpu: 500
        memory: 500
      replicas: 1
    publicAccess:
      enabled: true
      urlPrefix: test-manager-api
    network:
      serviceName: test-manager-backend
      ports:
        - port: 80
          targetPort: 8080
    variables:
      - name: MONGO_USER
        inputType: ProjectVariable
        required: true
        secret: true
        variableKey: MONGO_USER
      - name: MONGO_PASSWORD
        inputType: ProjectVariable
        required: true
        secret: true
        variableKey: MONGO_ROOT_PASSWORD
      - name: MONGO_HOST
        inputType: FreeText
        required: true
        value: mongodb
      - name: CONFIG_API_URL
        inputType: FreeText
        required: true
        value: http://dynamic-configuration-manager
      - name: LOCAL_DEV_MODE
        inputType: FreeText
        value: false
      - name: POST_RACE_AGENT_ID
        inputType: ProjectVariable
        description: Agent configuration ID of the Post-Race Analyzer agent. Per-environment project variable — each portal (dev/byox) holds its own agent GUID. Empty disables the AI summary runner.
        variableKey: POST_RACE_AGENT_ID
      - name: PAT_TOKEN
        inputType: ProjectVariable
        description: User-scoped Personal Access Token authenticating Quix.AI agent sessions for the post-race summary runner. Required for the headless/auto-trigger path — the workspace service-account SDK token cannot use Quix AI.
        required: true
        secret: true
        variableKey: PAT_TOKEN
      - name: TESTMANAGER_MCP_API_KEY
        inputType: ProjectVariable
        description: X-API-Key gating the Test Manager /mcp endpoint. Must match the key registered for this MCP server on the Quix.AI agent(s).
        required: true
        secret: true
        variableKey: TESTMANAGER_MCP_API_KEY
      - name: TRIGGER_SECRET
        inputType: ProjectVariable
        description: Optional shared secret gating auto-triggered analyses. When set, an auto POST must carry a matching X-Trigger-Secret header (sent by AC Post-Race Trigger). Unset = gate disabled. Set the SAME value here and on AC Post-Race Trigger.
        secret: true
        variableKey: TRIGGER_SECRET
      - name: SMTP_HOST
        inputType: FreeText
        description: SMTP server host for emailing completed post-race analyses (F4). Unset = email disabled (analysis still completes; emailing is best-effort).
        value: smtp.gmail.com
      - name: SMTP_PORT
        inputType: FreeText
        description: SMTP server port (STARTTLS submission default).
        value: 587
      - name: SMTP_USER
        inputType: ProjectVariable
        description: SMTP auth username (the sending address). Set per-env in the Portal so the address stays out of the public repo.
        variableKey: SMTP_USER
      - name: SMTP_PASSWORD
        inputType: ProjectVariable
        description: SMTP auth password / app-password. Secret.
        secret: true
        variableKey: SMTP_PASSWORD
      - name: SMTP_FROM
        inputType: ProjectVariable
        description: From address for analysis emails (defaults to SMTP_USER). Set in the Portal to keep it out of the public repo.
        variableKey: SMTP_FROM
      - name: SMTP_STARTTLS
        inputType: FreeText
        description: Issue STARTTLS before auth on port 587 (true/false). Ignored when SMTP_SSL=true.
        value: true
      - name: SMTP_SSL
        inputType: FreeText
        description: Use implicit TLS (port 465) instead of STARTTLS (true/false).
        value: false
  - name: Test Manager - Frontend
    group: Test Manager
    application: test-manager-frontend
    version: latest
    deploymentType: Service
    resources:
      limits:
        cpu: 500
        memory: 500
      replicas: 1
    publicAccess:
      enabled: true
      urlPrefix: test-manager
    network:
      serviceName: test-manager-frontend
      ports:
        - port: 80
          targetPort: 3000
    variables:
      - name: API_URL
        inputType: FreeText
        description: Backend API URL for server-side requests (internal Kubernetes service name)
        required: true
        value: http://test-manager-backend
      - name: NODE_ENV
        inputType: FreeText
        description: Node environment
        required: true
        value: production
      - name: NEXT_TELEMETRY_DISABLED
        inputType: FreeText
        description: Disable Next.js telemetry
        value: 1
      - name: NEXT_PUBLIC_TELEMETRY_EXPLORER_URL
        inputType: ProjectVariable
        description: Public URL of the Telemetry Explorer deployment
        required: true
        variableKey: TELEMETRY_EXPLORER_URL
      - name: NEXT_PUBLIC_LAKEHOUSE_UI_URL
        inputType: ProjectVariable
        description: Public URL of the Lakehouse Query UI deployment (lh-ui-*). Embedded for the "View Data" link on tests/sessions; unset disables the feature.
        variableKey: LAKEHOUSE_UI_URL
      - name: NEXT_PUBLIC_LEADERBOARD_UI_URL
        inputType: ProjectVariable
        description: Public URL of the leaderboard-service deployment. Embedded as the Analysis Leaderboard tab; unset disables the tab.
        variableKey: LEADERBOARD_UI_URL
    plugin:
      embeddedView:
        enabled: true
        hideHeader: true
        default: true
      sidebarItem:
        show: true
        label: Test Manager
        icon: data_thresholding
        order: 1
      globalItem:
        show: true
        label: Test Manager
        order: 0
  - name: AC Video Browser
    group: Analysis
    application: ac-video-browser
    version: latest
    deploymentType: Service
    resources:
      limits:
        cpu: 500
        memory: 2000
      replicas: 1
    publicAccess:
      enabled: true
      urlPrefix: acvideobrowser
    network:
      ports:
        - port: 80
          targetPort: 80
    variables:
      - name: BLOB_VIDEO_PREFIX
        inputType: FreeText
        description: Blob storage path prefix where MP4 recordings are stored
        value: ac_video
    blobStorage:
      bind: true
  - name: Telemetry Explorer
    group: Analysis
    application: telemetry-comparison
    version: latest
    deploymentType: Service
    resources:
      limits:
        cpu: 1000
        memory: 1000
      replicas: 1
    publicAccess:
      enabled: true
      urlPrefix: telemetryexplorer
    network:
      ports:
        - port: 80
          targetPort: 80
    variables:
      - name: TABLE_NAME
        inputType: ProjectVariable
        description: Lakehouse table to query. Per-environment project variable — must match the AC Telemetry Lake sink's table for this environment.
        required: true
        variableKey: AC_TELEMETRY_TABLE_NAME
      - name: BLOB_VIDEO_PREFIX
        inputType: FreeText
        description: Blob storage prefix where MP4 recordings + sidecar JSONs are stored
        value: ac_video
      - name: AC_TELEMETRY_AGENT_ID
        inputType: ProjectVariable
        description: Agent configuration ID of the AC Telemetry Agent (system prompt + KBs + MCP tools). Per-environment project variable — each portal (dev/byox) holds its own agent GUID. Required — if unset, config.py silently falls back to the dev GUID and AI chat hits a non-existent agent on byox/prod.
        required: true
        variableKey: AC_TELEMETRY_AGENT_ID
      - name: TELEMETRY_COMPARISON_MCP_API_KEY
        inputType: ProjectVariable
        description: X-API-Key gating the /mcp endpoint (plot_data tool). Must match the key registered for this MCP server on the AC Telemetry Agent.
        required: true
        secret: true
        variableKey: TELEMETRY_COMPARISON_MCP_API_KEY
      - name: MONGO_USER
        inputType: ProjectVariable
        required: true
        secret: true
        variableKey: MONGO_USER
      - name: MONGO_PASSWORD
        inputType: ProjectVariable
        required: true
        secret: true
        variableKey: MONGO_ROOT_PASSWORD
      - name: MONGO_HOST
        inputType: FreeText
        required: true
        value: mongodb
      - name: MONGO_PORT
        inputType: FreeText
        value: 27017
      - name: MONGO_DATABASE
        inputType: FreeText
        description: DB holding track_layouts (same DB track-importer writes to).
        value: test_manager
    plugin:
      embeddedView:
        enabled: true
        hideHeader: true
        default: true
      globalItem:
        show: true
        label: Telemetry Explorer
        icon: data_usage
        order: 0
    blobStorage:
      bind: true
  - name: MongoDB Backup Manager
    group: Test Manager
    application: mongodb-backup-manager
    version: latest
    deploymentType: Service
    resources:
      limits:
        cpu: 500
        memory: 1000
      replicas: 1
    publicAccess:
      enabled: true
      urlPrefix: backup-manager
    state:
      enabled: true
      size: 1
    network:
      serviceName: backup-manager
      ports:
        - port: 80
          targetPort: 80
    variables:
      - name: METADATA_BACKEND
        inputType: Options
        description: "Metadata storage backend: 'mongo' or 'json'"
        required: true
        value: json
      - name: METADATA_MONGO_HOST
        inputType: FreeText
        description: Metadata MongoDB hostname (only when METADATA_BACKEND=mongo)
        value: ''
      - name: METADATA_MONGO_PORT
        inputType: FreeText
        description: Metadata MongoDB port (only when METADATA_BACKEND=mongo)
        value: 27017
      - name: METADATA_MONGO_USERNAME
        inputType: FreeText
        description: Metadata MongoDB username (only when METADATA_BACKEND=mongo)
        value: ''
      - name: METADATA_MONGO_PASSWORD
        inputType: ProjectVariable
        description: Metadata MongoDB password (only when METADATA_BACKEND=mongo)
        variableKey: MONGO_PASSWORD
      - name: SECRET_KEY
        inputType: ProjectVariable
        description: Encryption key for stored server passwords (Fernet)
        required: true
        variableKey: MONGO_BACKUP_SECRET_KEY
      - name: BLOB_BASE_PATH
        inputType: FreeText
        description: Base path in Quix blob storage for backup archives
        required: true
        value: backups/mongodb
      - name: BACKUP_RETENTION_DAYS
        inputType: FreeText
        description: Default retention period for backups in days
        required: true
        value: 30
    plugin:
      embeddedView:
        enabled: true
        hideHeader: true
        default: true
      sidebarItem:
        show: true
        label: Backup Manager
        icon: save
        order: 0
    blobStorage:
      bind: true
  - name: QuixLab
    group: Analysis
    application: quixlab
    version: latest
    deploymentType: Service
    resources:
      limits:
        cpu: 500
        memory: 2000
      replicas: 1
    publicAccess:
      enabled: true
      urlPrefix: quixlab
    state:
      enabled: true
      size: 1
    network:
      ports:
        - port: 80
          targetPort: 80
    variables:
      - name: QUIXLAB_NOTEBOOK
        inputType: FreeText
        description: Notebook file to open on startup (leave empty for the file picker)
        value: main.py
      - name: QUIXLAB_MODE
        inputType: FreeText
        description: "Run mode: 'app' (view only) or 'edit' (full editor)"
        value: edit
      - name: QUIXLAB_MCP_KEY
        inputType: ProjectVariable
        description: Shared secret used by Quix AI MCP server registration. Must match the X-API-Key value configured for the org-level MCP entry that scopes the QuixLab Assistant agent.
        required: true
        secret: true
        variableKey: QUIXLAB_MCP_KEY
      - name: QUIXLAB_AGENT_ID
        inputType: ProjectVariable
        description: UUID of the Quix AI cloud agent bound to this QuixLab deployment (per-deployment QuixLab Assistant). Injected into the iframe-config response so per-cell newMessage postMessages preselect the right agent.
        required: true
        variableKey: QUIXLAB_AGENT_ID
    plugin:
      embeddedView:
        enabled: true
        hideHeader: true
        default: true
      sidebarItem:
        show: true
        label: QuixLab
        icon: grid_view
        order: 1
      globalItem:
        show: true
        label: QuixLab
        icon: find_in_page
        order: 1
    blobStorage:
      bind: true
  - name: Quix DataLake Raw Sink
    group: Ingestion
    application: DataLake.Sink
    version: latest
    deploymentType: Managed
    resources:
      limits:
        cpu: 500
        memory: 1500
      replicas: 1
    configuration:
      topic: ac-telemetry-raw
  - name: leaderboard-service
    application: leaderboard-service
    version: latest
    deploymentType: Service
    resources:
      limits:
        cpu: 1000
        memory: 2000
      replicas: 1
    publicAccess:
      enabled: true
      urlPrefix: leaderboard-service-9cb716a
    state:
      enabled: true
      size: 2
    network:
      serviceName: leaderboard-service
      ports:
        - port: 80
          targetPort: 8080
    variables:
      - name: MONGO_USER
        inputType: ProjectVariable
        required: true
        variableKey: MONGO_USER
      - name: MONGO_PASSWORD
        inputType: ProjectVariable
        required: true
        variableKey: MONGO_ROOT_PASSWORD
      - name: MONGO_HOST
        inputType: FreeText
        required: true
        value: mongodb
      - name: CONFIG_API_URL
        inputType: FreeText
        required: true
        value: https://config-api-svc-demo-simrigtelemetry-prod.edge.byox.demo
      - name: output
        inputType: InputTopic
        description: Kafka topic for raw AC telemetry (ac-telemetry-raw)
        required: true
        value: ac-telemetry-raw
      - name: session_output
        inputType: InputTopic
        description: Kafka topic for AC session events (ac-telemetry-session)
        required: true
        value: ac-telemetry-session
      - name: config_input
        inputType: InputTopic
        description: DCM config events topic (ac-telemetry-config) — declared so the pipeline view shows this service consuming it
        required: true
        value: ac-telemetry-config
      - name: LAKE_TABLE
        inputType: FreeText
        value: ac_telemetry_prod
      - name: LAKE_COL_CURRENT_TIME
        inputType: FreeText
        value: iCurrentTime
      - name: LAKE_COL_BEST_TIME
        inputType: FreeText
        value: iBestTime
      - name: LAKE_COL_NORMALIZED_POSITION
        inputType: FreeText
        value: normalizedCarPosition
      - name: GATE_COUNT
        inputType: FreeText
        value: 1200
      - name: LOCAL_DEV_MODE
        inputType: FreeText
        value: false
      - name: LIVE_TELEMETRY_ENABLED
        inputType: FreeText
        value: true
      - name: NEXT_PUBLIC_FREEZE_MS
        inputType: FreeText
        description: 'Build-time: blue-freeze window ms (baked into UI bundle)'
        value: 5
      - name: NEXT_PUBLIC_QUIX_AUTH_TOKEN
        inputType: ProjectVariable
        description: 'Build-time: standalone-mode fallback PAT baked into UI bundle'
        secret: true
    blobStorage:
      bind: true
  - name: track-importer
    group: Test Manager
    application: track-importer
    version: latest
    deploymentType: Job
    resources:
      limits:
        cpu: 200
        memory: 500
      replicas: 1
    variables:
      - name: MONGO_USER
        inputType: ProjectVariable
        required: true
        secret: true
        variableKey: MONGO_USER
      - name: MONGO_PASSWORD
        inputType: ProjectVariable
        required: true
        secret: true
        variableKey: MONGO_ROOT_PASSWORD
      - name: MONGO_HOST
        inputType: FreeText
        required: true
        value: mongodb
      - name: MONGO_PORT
        inputType: FreeText
        value: 27017
      - name: MONGO_DATABASE
        inputType: FreeText
        description: Target DB for track_layouts (the DB the backend connects to).
        value: test_manager
  - name: Speed Dashboard
    application: speed-dashboard
    version: latest
    deploymentType: Service
    resources:
      limits:
        cpu: 200
        memory: 300
      replicas: 1
    publicAccess:
      enabled: true
      urlPrefix: speed-dashboard
    desiredStatus: Running
    variables:
      - name: input
        inputType: InputTopic
        description: Kafka topic to consume AC telemetry from
        required: true
        value: ac-telemetry-raw
      - name: WINDOW_SECONDS
        inputType: FreeText
        description: Rolling window size in seconds to display on the chart
        value: 30
  - name: ac-telemetry-raw
    application: DataLake.Replay
    version: latest
    deploymentType: Managed
    resources:
      limits:
        cpu: 500
        memory: 500
      replicas: 1
    configuration:
      sourceWorkspaceId: demo-acquixbridge-dev
      sourceTopic: ac-telemetry-raw
      sourceKeys: QUIX-GAMING
      destinationTopic: ac-telemetry-raw
      suffixReplayedKeysWithTimestamp: false
      fromTimestamp: 2026-06-17T11:40:05.000Z
      toTimestamp: 2026-06-17T11:48:17.653Z
      removeGaps: true
      maxGapSizeInMilliseconds: 10000
    disabled: true
  - name: best-laps-cache
    application: best-laps-cache
    version: latest
    deploymentType: Service
    resources:
      limits:
        cpu: 500
        memory: 1000
      replicas: 1
    publicAccess:
      enabled: true
      urlPrefix: best-laps-cache-6172bf5
    state:
      enabled: true
      size: 3
    network:
      serviceName: best-laps-cache
      ports:
        - port: 80
          targetPort: 80
    variables:
      - name: output
        inputType: InputTopic
        description: Kafka topic for raw AC telemetry (ac-telemetry-raw)
        required: true
        value: ac-telemetry-raw
      - name: session_output
        inputType: InputTopic
        description: Kafka topic for AC session events (ac-telemetry-session)
        value: ac-telemetry-session
      - name: config_input
        inputType: InputTopic
        description: DCM config events topic (ac-telemetry-config)
        value: ac-telemetry-config
      - name: CONFIG_API_URL
        inputType: FreeText
        description: DCM base URL for session/experiment enrichment
        value: https://config-api-svc-demo-simrigtelemetry-prod.edge.byox.demo
      - name: LAKE_TABLE
