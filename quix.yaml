# Quix Project Descriptor
# This file describes the data pipeline and configuration of resources of a Quix Project.

metadata:
  version: 1.0

# This section describes the Deployments of the data pipeline
deployments:
  - name: Telemetry Dashboard
    application: telemetry-dashboard
    version: latest
    deploymentType: Service
    resources:
      cpu: 200
      memory: 500
      replicas: 1
    publicAccess:
      enabled: true
      urlPrefix: telemetrydashboard
    network:
      ports:
        - port: 80
          targetPort: 80
    variables:
      - name: input
        inputType: InputTopic
        description: Kafka topic to consume telemetry from
        required: true
        value: ac-telemetry-raw
  - name: MongoDB
    application: mongodb
    version: latest
    deploymentType: Service
    resources:
      cpu: 200
      memory: 800
      replicas: 1
    network:
      serviceName: mongodb
      ports:
        - port: 27017
          targetPort: 27017
    variables:
      - name: MONGO_INITDB_ROOT_USERNAME
        inputType: FreeText
        description: The root username to initialize MongoDB with
        required: true
        value: admin
      - name: MONGO_INITDB_ROOT_PASSWORD
        inputType: Secret
        description: The root password to initialize MongoDB with
        required: true
        secretKey: MONGO_ROOT_PASSWORD
  - name: Config Form
    application: config-form
    version: latest
    deploymentType: Service
    resources:
      cpu: 1000
      memory: 2000
      replicas: 1
    publicAccess:
      enabled: true
      urlPrefix: configform
    network:
      ports:
        - port: 80
          targetPort: 80
    variables:
      - name: CONFIG_MANAGER_URL
        inputType: FreeText
        description: URL of the Dynamic Configuration Manager API
        required: true
        value: https://config-api-svc-quixers-acquixbridge-dev.az-france-0.app.quix.io
      - name: CONFIG_TYPE
        inputType: FreeText
        description: Config type in the Dynamic Configuration Manager
        required: true
        value: experiment
      - name: TARGET_KEY
        inputType: FreeText
        description: Target key for the config
        required: true
        value: '*'
  - name: Session Config Bridge
    application: session-config-bridge
    version: latest
    deploymentType: Service
    resources:
      cpu: 200
      memory: 300
      replicas: 1
    variables:
      - name: input
        inputType: InputTopic
        description: Topic to consume AC session data from
        required: true
        value: ac-telemetry-session
      - name: CONFIG_MANAGER_URL
        inputType: FreeText
        description: URL of the Dynamic Configuration Manager API
        value: https://config-api-svc-quixers-acquixbridge-dev.az-france-0.app.quix.io
      - name: CONFIG_TYPE
        inputType: FreeText
        description: Config type for session data
        value: session
  - name: Dynamic Configuration Manager
    application: DynamicConfiguration
    version: latest
    deploymentType: Managed
    resources:
      cpu: 500
      memory: 1000
      replicas: 1
    configuration:
      topic: ac-telemetry-config
      mongoHost: mongodb
      mongoPort: 27017
      mongoUser: admin
      mongoPasswordSecret: MONGO_ROOT_PASSWORD
      mongoDatabase: ac_telemetry
      mongoCollection: experiment_configs
  - name: AC Telemetry Lake sink
    application: ac-telemetry-lake
    version: latest
    deploymentType: Service
    resources:
      cpu: 1000
      memory: 4000
      replicas: 1
    variables:
      - name: input
        inputType: InputTopic
        description: Name of the Kafka input topic to consume from
        required: true
        value: ac-telemetry-raw
      - name: config_topic
        inputType: InputTopic
        description: Dynamic Configuration Manager topic for enrichment
        required: true
        value: ac-telemetry-config
      - name: TABLE_NAME
        inputType: FreeText
        description: Table name for data organization and registration, else defaults to topic name
        value: ac_telemetry
      - name: HIVE_COLUMNS
        inputType: FreeText
        description: Comma-separated list of columns for Hive partitioning. Include year/month/day/hour to extract from TIMESTAMP_COLUMN (e.g., location,year,month,day,sensor_type)
        value: environment,test_rig,experiment,driver,track,carModel,session_id,lap
      - name: TIMESTAMP_COLUMN
        inputType: FreeText
        description: Column containing timestamp values to extract year/month/day/hour from
        value: timestamp_ms
      - name: CATALOG_URL
        inputType: FreeText
        description: REST Catalog URL for optional table registration (leave empty to skip)
        value: https://iceberg-catalog-quixers-testrigdemodatawarehouse-prod.az-france-0.app.quix.io
      - name: CATALOG_AUTH_TOKEN
        inputType: Secret
        description: If using a catalog, the respective auth token to access it
        secretKey: pat
      - name: AUTO_DISCOVER
        inputType: Options
        description: Automatically register table in REST Catalog on first write
        value: true
      - name: CATALOG_NAMESPACE
        inputType: FreeText
        description: Catalog namespace for table registration
        value: default
      - name: BATCH_SIZE
        inputType: FreeText
        description: Number of messages to batch before writing to storage
        value: 10000
      - name: COMMIT_INTERVAL
        inputType: FreeText
        description: Kafka commit interval in seconds
        value: 30
      - name: KAFKA_KEY_DESERIALIZER
        inputType: FreeText
        description: The key deserializer to use
        value: str
      - name: KAFKA_VALUE_DESERIALIZER
        inputType: FreeText
        description: the value deserializer to use
        value: json
      - name: CONSUMER_GROUP
        inputType: FreeText
        description: Kafka consumer group name
        value: s3_direct_sink_v1.7
      - name: AUTO_OFFSET_RESET
        inputType: Options
        description: Where to start consuming if no offset exists
        value: earliest
      - name: LOGLEVEL
        inputType: Options
        description: Application logging level
        value: INFO
      - name: MAX_WRITE_WORKERS
        inputType: FreeText
        description: How many files can be written in parallel to storage at once (based on partitioning + batch size)
        value: 10
    blobStorage:
      bind: true
  - name: Test Manager - Backend
    application: test-manager-backend
    version: latest
    deploymentType: Service
    resources:
      cpu: 500
      memory: 500
      replicas: 1
    publicAccess:
      enabled: true
      urlPrefix: test-manager-api
    network:
      serviceName: test-manager-backend
      ports:
        - port: 80
          targetPort: 8080
    variables:
      - name: MONGO_USER
        inputType: FreeText
        required: true
        value: admin
      - name: MONGO_PASSWORD
        inputType: Secret
        required: true
        secretKey: MONGO_ROOT_PASSWORD
      - name: MONGO_HOST
        inputType: FreeText
        required: true
        value: mongodb
      - name: MONGO_DATABASE
        inputType: FreeText
        required: true
        value: test_manager
      - name: INFLUXDB_USER
        inputType: FreeText
        required: true
        value: admin
      - name: INFLUXDB_PASSWORD
        inputType: Secret
        required: true
        secretKey: INFLUXDB_PASSWORD
      - name: INFLUXDB_HOST
        inputType: FreeText
        required: true
        value: influxdb
      - name: INFLUXDB_PORT
        inputType: FreeText
        required: true
        value: 8086
      - name: CONFIG_API_URL
        inputType: FreeText
        value: http://dynamic-configuration-manager
      - name: Quix__BlobStorage__Connection__Json
        inputType: Secret
        required: true
        secretKey: Quix__BlobStorage__Connection__Json
  - name: Test Manager - Frontend
    application: test-manager-frontend
    version: latest
    deploymentType: Service
    resources:
      cpu: 500
      memory: 500
      replicas: 1
    publicAccess:
      enabled: true
      urlPrefix: test-manager
    network:
      serviceName: test-manager-frontend
      ports:
        - port: 80
          targetPort: 3000
    variables:
      - name: API_URL
        inputType: FreeText
        description: Backend API URL for server-side requests
        required: true
        value: http://test-manager-backend
      - name: NODE_ENV
        inputType: FreeText
        required: true
        value: production
      - name: NEXT_TELEMETRY_DISABLED
        inputType: FreeText
        value: 1
    plugin:
      embeddedView:
        enabled: true
        hideHeader: true
        default: true
      sidebarItem:
        show: true
        label: Test Manager
        icon: data_thresholding
        order: 1
  - name: InfluxDB v1
    image: influxdb:1.11.8
    deploymentType: Service
    resources:
      cpu: 200
      memory: 500
      replicas: 1
    network:
      serviceName: influxdb
      ports:
        - port: 8086
          targetPort: 8086
    variables:
      - name: INFLUXDB_ADMIN_USER
        inputType: FreeText
        required: true
        value: admin
      - name: INFLUXDB_ADMIN_PASSWORD
        inputType: Secret
        required: true
        secretKey: INFLUXDB_PASSWORD
      - name: INFLUXDB_DB
        inputType: FreeText
        required: true
        value: test_manager
  - name: RaceTelemetryAnalysis
    application: racetelemetryanalysis
    version: latest
    deploymentType: Service
    resources:
      cpu: 500
      memory: 2000
      replicas: 1
    publicAccess:
      enabled: true
      urlPrefix: racetelemetryanalysis
    state:
      enabled: true
      size: 1
    network:
      ports:
        - port: 80
          targetPort: 8080
    variables:
      - name: MARIMO_MODE
        inputType: Options
        description: Mode to run Marimo in
        value: edit
      - name: MARIMO_NOTEBOOK
        inputType: FreeText
        description: The notebook file to open (e.g., main.py)
        value: main.py
      - name: ANTHROPIC_API_KEY
        inputType: Secret
        description: Token generated from https://platform.claude.com/settings/keys.
    plugin:
      embeddedView:
        enabled: true
        hideHeader: true
        default: true
      sidebarItem:
        show: true
        icon: note_alt
        badge: BETA
  - name: RawDataVisualization
    application: rawdatavisualization
    version: latest
    deploymentType: Service
    resources:
      cpu: 500
      memory: 2000
      replicas: 1
    publicAccess:
      enabled: true
      urlPrefix: rawdatavisualization
    state:
      enabled: true
      size: 1
    network:
      ports:
        - port: 80
          targetPort: 8080
    variables:
      - name: MARIMO_MODE
        inputType: Options
        description: Mode to run Marimo in
        value: edit
      - name: MARIMO_NOTEBOOK
        inputType: FreeText
        description: The notebook file to open (e.g., main.py)
        value: main.py
      - name: ANTHROPIC_API_KEY
        inputType: Secret
        description: Token generated from https://platform.claude.com/settings/keys.
    plugin:
      embeddedView:
        enabled: true
        hideHeader: true
        default: true
      sidebarItem:
        show: true
        icon: note_alt
        order: 0
        badge: BETA
  - name: RawDataVisualizationApp
    application: rawdatavisualization
    version: latest
    deploymentType: Service
    resources:
      cpu: 500
      memory: 2000
      replicas: 1
    publicAccess:
      enabled: true
      urlPrefix: app-rawdatavisualization
    state:
      enabled: true
      size: 1
    network:
      ports:
        - port: 80
          targetPort: 8080
    variables:
      - name: MARIMO_MODE
        inputType: Options
        description: Mode to run Marimo in
        value: run
      - name: MARIMO_NOTEBOOK
        inputType: FreeText
        description: The notebook file to open (e.g., main.py)
        value: main.py
      - name: ANTHROPIC_API_KEY
        inputType: Secret
        description: Token generated from https://platform.claude.com/settings/keys.
    plugin:
      embeddedView:
        enabled: true
        hideHeader: true
        default: true
      sidebarItem:
        show: true
        icon: note_alt
        order: 0
        badge: BETA
      globalItem:
        show: true
        label: Telemetry Analysis
        icon: rocket_launch
        order: 0
  - name: Telemetry Explorer
    application: telemetry-comparison
    version: latest
    deploymentType: Service
    resources:
      cpu: 200
      memory: 500
      replicas: 1
    publicAccess:
      enabled: true
      urlPrefix: telemetryexplorer
    network:
      ports:
        - port: 80
          targetPort: 80
    variables:
      - name: QUIX_LAKE_TOKEN
        inputType: Secret
        description: Token to authenticate against QuixLake
        required: true
        secretKey: pat
      - name: QUIXLAKE_URL
        inputType: FreeText
        description: Base URL of the QuixLake instance
        required: true
        value: https://quixlake-quixers-testrigdemodatawarehouse-prod.az-france-0.app.quix.io
      - name: TABLE_NAME
        inputType: FreeText
        description: QuixLake table name for telemetry data
        value: ac_telemetry
    plugin:
      embeddedView:
        enabled: true
        hideHeader: true
        default: true
      globalItem:
        show: true
        label: Telemetry Explorer
        icon: data_usage
        order: 0

# This section describes the Topics of the data pipeline
topics:
  - name: ac-telemetry-raw
    configuration:
      partitions: 1
      replicationFactor: 1
      retentionInMinutes: -1
      retentionInBytes: 1048576000
  - name: ac-telemetry-session
    configuration:
      partitions: 1
      replicationFactor: 1
      retentionInMinutes: -1
      cleanupPolicy: Compact
  - name: tsbs_data_transformed
  - name: ac-telemetry-config
