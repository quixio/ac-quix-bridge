# Quix Project Descriptor
# This file describes the data pipeline and configuration of resources of a Quix Project.

metadata:
  version: 1.0

# This section describes the Deployments of the data pipeline
deployments:
  - name: AC Telemetry Source
    application: ac-telemetry-source
    version: latest
    deploymentType: Service
    resources:
      cpu: 200
      memory: 500
      replicas: 1
    variables:
      - name: output
        inputType: OutputTopic
        description: Name of the output topic to write telemetry into
        required: true
        value: ac-telemetry-raw
      - name: session_output
        inputType: OutputTopic
        description: Topic to write session metadata into
        required: true
        value: ac-telemetry-session
      - name: SAMPLE_RATE_HZ
        inputType: FreeText
        description: Telemetry sample rate in Hz
        value: 60
  - name: Telemetry Dashboard
    application: telemetry-dashboard
    version: latest
    deploymentType: Service
    resources:
      cpu: 200
      memory: 500
      replicas: 1
    publicAccess:
      enabled: true
      urlPrefix: telemetrydashboard
    network:
      ports:
        - port: 80
          targetPort: 80
    variables:
      - name: input
        inputType: InputTopic
        description: Kafka topic to consume telemetry from
        required: true
        value: ac-telemetry-raw

# This section describes the Topics of the data pipeline
topics:
  - name: ac-telemetry-raw
    configuration:
      partitions: 1
      replicationFactor: 1
      retentionInMinutes: -1
  - name: ac-telemetry-session
    configuration:
      partitions: 1
      replicationFactor: 1
      retentionInMinutes: -1
      cleanupPolicy: Compact
