# Quix Project Descriptor
# This file describes the data pipeline and configuration of resources of a Quix Project.

metadata:
  version: 1.0

# This section describes the Deployments of the data pipeline
deployments:
  - name: Telemetry Dashboard
    application: telemetry-dashboard
    version: latest
    deploymentType: Service
    resources:
      cpu: 200
      memory: 500
      replicas: 1
    publicAccess:
      enabled: true
      urlPrefix: telemetrydashboard
    network:
      ports:
        - port: 80
          targetPort: 80
    variables:
      - name: input
        inputType: InputTopic
        description: Kafka topic to consume telemetry from
        required: true
        value: ac-telemetry-raw
  - name: MongoDB
    application: mongodb
    version: latest
    deploymentType: Service
    resources:
      cpu: 200
      memory: 800
      replicas: 1
    state:
      enabled: true
      size: 3
    network:
      serviceName: mongodb
      ports:
        - port: 27017
          targetPort: 27017
    variables:
      - name: MONGO_INITDB_ROOT_USERNAME
        inputType: FreeText
        description: The root username to initialize MongoDB with
        required: true
        value: admin
      - name: MONGO_INITDB_ROOT_PASSWORD
        inputType: Secret
        description: The root password to initialize MongoDB with
        required: true
        secretKey: MONGO_ROOT_PASSWORD
  - name: Session Config Bridge
    application: session-config-bridge
    version: latest
    deploymentType: Service
    resources:
      cpu: 200
      memory: 300
      replicas: 1
    variables:
      - name: input
        inputType: InputTopic
        description: Topic to consume AC session data from
        required: true
        value: ac-telemetry-session
      - name: CONFIG_MANAGER_URL
        inputType: FreeText
        description: URL of the Dynamic Configuration Manager API
        required: true
        value: http://dynamic-configuration-manager
      - name: CONFIG_TYPE
        inputType: FreeText
        description: Config type for session data
        required: true
        value: session
      - name: TEST_MANAGER_URL
        inputType: FreeText
        description: Test Manager backend URL (in-cluster service name)
        value: http://test-manager-backend
  - name: Dynamic Configuration Manager
    application: DynamicConfiguration
    version: latest
    deploymentType: Managed
    resources:
      cpu: 500
      memory: 1000
      replicas: 1
    network:
      serviceName: dynamic-configuration-manager
    configuration:
      topic: ac-telemetry-config
      mongoHost: mongodb
      mongoPort: 27017
      mongoUser: admin
      mongoPasswordSecret: MONGO_ROOT_PASSWORD
      mongoDatabase: ac_telemetry
      mongoCollection: experiment_configs
  - name: AC Telemetry Lake sink
    application: ac-telemetry-lake
    version: latest
    deploymentType: Service
    resources:
      cpu: 1000
      memory: 4000
      replicas: 1
    variables:
      - name: input
        inputType: InputTopic
        description: Name of the Kafka input topic to consume from
        required: true
        value: ac-telemetry-raw
      - name: config_topic
        inputType: InputTopic
        description: Dynamic Configuration Manager topic for enrichment
        required: true
        value: ac-telemetry-config
      - name: TABLE_NAME
        inputType: FreeText
        description: Table name for data organization and registration, else defaults to topic name
        value: ac_telemetry
      - name: HIVE_COLUMNS
        inputType: FreeText
        description: Comma-separated list of columns for Hive partitioning. Include year/month/day/hour to extract from TIMESTAMP_COLUMN (e.g., location,year,month,day,sensor_type)
        value: environment,test_rig,experiment,driver,track,carModel,session_id,lap
      - name: TIMESTAMP_COLUMN
        inputType: FreeText
        description: Column containing timestamp values to extract year/month/day/hour from
        value: timestamp_ms
      - name: CATALOG_URL
        inputType: FreeText
        description: REST Catalog URL for optional table registration (leave empty to skip)
        value: https://iceberg-catalog-quixdev-quixlakev2-dev.deployments-dev.quix.io
      - name: CATALOG_AUTH_TOKEN
        inputType: Secret
        description: If using a catalog, the respective auth token to access it
        secretKey: pat
      - name: AUTO_DISCOVER
        inputType: Options
        description: Automatically register table in REST Catalog on first write
        value: true
      - name: CATALOG_NAMESPACE
        inputType: FreeText
        description: Catalog namespace for table registration
        value: default
      - name: BATCH_SIZE
        inputType: FreeText
        description: Number of messages to batch before writing to storage
        value: 10000
      - name: COMMIT_INTERVAL
        inputType: FreeText
        description: Kafka commit interval in seconds
        value: 30
      - name: KAFKA_KEY_DESERIALIZER
        inputType: FreeText
        description: The key deserializer to use
        value: str
      - name: KAFKA_VALUE_DESERIALIZER
        inputType: FreeText
        description: the value deserializer to use
        value: json
      - name: CONSUMER_GROUP
        inputType: FreeText
        description: Kafka consumer group name
        value: s3_direct_sink_v1.7
      - name: AUTO_OFFSET_RESET
        inputType: Options
        description: Where to start consuming if no offset exists
        value: earliest
      - name: LOGLEVEL
        inputType: Options
        description: Application logging level
        value: INFO
      - name: MAX_WRITE_WORKERS
        inputType: FreeText
        description: How many files can be written in parallel to storage at once (based on partitioning + batch size)
        value: 10
    blobStorage:
      bind: true
  - name: Test Manager - Backend
    application: test-manager-backend
    version: latest
    deploymentType: Service
    resources:
      cpu: 500
      memory: 500
      replicas: 1
    publicAccess:
      enabled: true
      urlPrefix: test-manager-api
    network:
      serviceName: test-manager-backend
      ports:
        - port: 80
          targetPort: 8080
    variables:
      - name: MONGO_USER
        inputType: Secret
        required: true
        secretKey: MONGO_USER
      - name: MONGO_PASSWORD
        inputType: Secret
        required: true
        secretKey: MONGO_ROOT_PASSWORD
      - name: MONGO_HOST
        inputType: FreeText
        required: true
        value: mongodb
      - name: CONFIG_API_URL
        inputType: FreeText
        required: true
        value: http://dynamic-configuration-manager
  - name: Test Manager - Frontend
    application: test-manager-frontend
    version: latest
    deploymentType: Service
    resources:
      cpu: 500
      memory: 500
      replicas: 1
    publicAccess:
      enabled: true
      urlPrefix: test-manager
    network:
      serviceName: test-manager-frontend
      ports:
        - port: 80
          targetPort: 3000
    variables:
      - name: API_URL
        inputType: FreeText
        description: Backend API URL for server-side requests (internal Kubernetes service name)
        required: true
        value: http://test-manager-backend
      - name: NODE_ENV
        inputType: FreeText
        description: Node environment
        required: true
        value: production
      - name: NEXT_TELEMETRY_DISABLED
        inputType: FreeText
        description: Disable Next.js telemetry
        value: 1
      - name: NEXT_PUBLIC_TELEMETRY_EXPLORER_URL
        inputType: FreeText
        description: Public URL of the Telemetry Explorer deployment
        required: true
        value: https://telemetryexplorer-quixdev-acquixbridge-testmanager.deployments-dev.quix.io
    plugin:
      embeddedView:
        enabled: true
        hideHeader: true
        default: true
      sidebarItem:
        show: true
        label: Test Manager
        icon: data_thresholding
        order: 1
      globalItem:
        show: true
        label: Test Manager
        order: 0
  - name: RaceTelemetryAnalysis
    application: racetelemetryanalysis
    version: latest
    deploymentType: Service
    resources:
      cpu: 500
      memory: 2000
      replicas: 1
    publicAccess:
      enabled: true
      urlPrefix: racetelemetryanalysis
    state:
      enabled: true
      size: 1
    network:
      ports:
        - port: 80
          targetPort: 8080
    variables:
      - name: MARIMO_MODE
        inputType: Options
        description: Mode to run Marimo in
        value: edit
      - name: MARIMO_NOTEBOOK
        inputType: FreeText
        description: The notebook file to open (e.g., main.py)
        value: main.py
      - name: ANTHROPIC_API_KEY
        inputType: Secret
        description: Token generated from https://platform.claude.com/settings/keys.
    plugin:
      embeddedView:
        enabled: true
        hideHeader: true
        default: true
      sidebarItem:
        show: true
        icon: note_alt
        badge: BETA
  - name: RawDataVisualization
    application: rawdatavisualization
    version: latest
    deploymentType: Service
    resources:
      cpu: 500
      memory: 200
      replicas: 1
    publicAccess:
      enabled: true
      urlPrefix: rawdatavisualization
    state:
      enabled: true
      size: 1
    network:
      ports:
        - port: 80
          targetPort: 8080
    variables:
      - name: MARIMO_MODE
        inputType: Options
        description: Mode to run Marimo in
        value: edit
      - name: MARIMO_NOTEBOOK
        inputType: FreeText
        description: The notebook file to open (e.g., main.py)
        value: main.py
      - name: ANTHROPIC_API_KEY
        inputType: Secret
        description: Token generated from https://platform.claude.com/settings/keys.
    plugin:
      embeddedView:
        enabled: true
        hideHeader: true
        default: true
      sidebarItem:
        show: true
        icon: note_alt
        order: 0
        badge: BETA
  - name: RawDataVisualizationApp
    application: rawdatavisualization
    version: latest
    deploymentType: Service
    resources:
      cpu: 500
      memory: 200
      replicas: 1
    publicAccess:
      enabled: true
      urlPrefix: app-rawdatavisualization
    state:
      enabled: true
      size: 1
    network:
      ports:
        - port: 80
          targetPort: 8080
    variables:
      - name: MARIMO_MODE
        inputType: Options
        description: Mode to run Marimo in
        value: run
      - name: MARIMO_NOTEBOOK
        inputType: FreeText
        description: The notebook file to open (e.g., main.py)
        value: main.py
      - name: ANTHROPIC_API_KEY
        inputType: Secret
        description: Token generated from https://platform.claude.com/settings/keys.
    plugin:
      embeddedView:
        enabled: true
        hideHeader: true
        default: true
      sidebarItem:
        show: true
        icon: note_alt
        order: 0
        badge: BETA
      globalItem:
        show: true
        label: Telemetry Analysis
        icon: rocket_launch
        order: 0
  - name: AC Video Streaming
    application: ac_video_streaming
    version: f98d84a
    deploymentType: Service
    resources:
      cpu: 500
      memory: 1000
      replicas: 1
    variables:
      - name: output
        inputType: OutputTopic
        description: Kafka topic for video frame streaming
        required: true
        value: ac-video-frames
      - name: session_input
        inputType: InputTopic
        description: Topic from ac-telemetry-source carrying the canonical session_id
        required: true
        value: ac-telemetry-session
      - name: VIDEO_DISPLAY_INDEX
        inputType: FreeText
        description: Display index for screen capture (0 = primary)
        value: 0
      - name: VIDEO_FPS
        inputType: FreeText
        description: Capture and recording FPS (default 15 — AC machines rarely sustain 30 alongside the game)
        value: 15
      - name: STREAM_FPS
        inputType: FreeText
        description: FPS for Kafka frame streaming
        value: 15
      - name: VIDEO_RECORDING_ENABLED
        inputType: FreeText
        description: Enable MP4 recording (true/false)
        value: true
      - name: VIDEO_STREAM_ENABLED
        inputType: FreeText
        description: Enable Kafka frame streaming (true/false)
        value: false
      - name: BLOB_VIDEO_PREFIX
        inputType: FreeText
        description: Blob storage path prefix for MP4 uploads
        value: ac_video
      - name: RECORDING_WIDTH
        inputType: FreeText
        description: Cap recording width in pixels (height scales proportionally). 0 = inherit captured screen resolution.
        value: 1920
      - name: SIDECAR_SAMPLE_HZ
        inputType: FreeText
        description: Frequency (Hz) of sidecar JSON samples for video<->telemetry sync
        value: 5
    blobStorage:
      bind: true
    disabled: true
  - name: AC Video Viewer
    application: ac-video-viewer
    version: latest
    deploymentType: Service
    resources:
      cpu: 200
      memory: 500
      replicas: 1
    publicAccess:
      enabled: true
      urlPrefix: acvideoviewer
    network:
      ports:
        - port: 80
          targetPort: 80
    variables:
      - name: input
        inputType: InputTopic
        description: Kafka topic to consume video frames from
        required: true
        value: ac-video-frames
    disabled: true
  - name: AC Video Browser
    application: ac-video-browser
    version: latest
    deploymentType: Service
    resources:
      cpu: 500
      memory: 2000
      replicas: 1
    publicAccess:
      enabled: true
      urlPrefix: acvideobrowser
    network:
      ports:
        - port: 80
          targetPort: 80
    variables:
      - name: BLOB_VIDEO_PREFIX
        inputType: FreeText
        description: Blob storage path prefix where MP4 recordings are stored
        value: ac_video
    blobStorage:
      bind: true
  - name: Telemetry Explorer
    application: telemetry-comparison
    version: latest
    deploymentType: Service
    resources:
      cpu: 1000
      memory: 2000
      replicas: 1
    publicAccess:
      enabled: true
      urlPrefix: telemetryexplorer
    network:
      ports:
        - port: 80
          targetPort: 80
    variables:
      - name: QUIX_LAKE_TOKEN
        inputType: Secret
        description: Token to authenticate against QuixLake
        required: true
        secretKey: pat_token
      - name: QUIXLAKE_URL
        inputType: FreeText
        description: Base URL of the QuixLake instance
        required: true
        value: https://quixlake-quixdev-quixlakev2-dev.deployments-dev.quix.io
      - name: TABLE_NAME
        inputType: FreeText
        description: QuixLake table name for telemetry data
        value: ac_telemetry
      - name: BLOB_VIDEO_PREFIX
        inputType: FreeText
        description: Blob storage prefix where MP4 recordings + sidecar JSONs are stored
        value: ac_video
    plugin:
      embeddedView:
        enabled: true
        hideHeader: true
        default: true
      globalItem:
        show: true
        label: Telemetry Explorer
        icon: data_usage
        order: 0
    blobStorage:
      bind: true
  - name: Telemetry Chat
    application: telemetry-chat
    version: latest
    deploymentType: Service
    resources:
      cpu: 500
      memory: 1000
      replicas: 1
    publicAccess:
      enabled: true
      urlPrefix: telemetrychat
    network:
      ports:
        - port: 80
          targetPort: 80
    variables:
      - name: QUIX_TOKEN
        inputType: Secret
        description: Quix PAT used to call the Quix AI agent
        required: true
        secretKey: pat_token
      - name: QUIXLAKE_URL
        inputType: FreeText
        description: Base URL of the QuixLake instance
        required: true
        value: https://quixlake-quixdev-quixlakev2-dev.deployments-dev.quix.io
      - name: QUIX_LAKE_TOKEN
        inputType: Secret
        description: Token to authenticate against QuixLake
        required: true
        secretKey: pat_token
      - name: TABLE_NAME
        inputType: FreeText
        description: QuixLake table name for telemetry data
        value: ac_telemetry
      - name: SHARED_PASSWORD
        inputType: Secret
        description: Shared password for HTTP Basic auth gating the whole app
        required: true
        secretKey: TELEMETRY_CHAT_PASSWORD
      - name: LOG_LEVEL
        inputType: FreeText
        description: Python logging level
        value: INFO
  - name: MongoDB Backup Manager
    application: mongodb-backup-manager
    version: latest
    deploymentType: Service
    resources:
      cpu: 500
      memory: 1000
      replicas: 1
    publicAccess:
      enabled: true
      urlPrefix: backup-manager
    state:
      enabled: true
      size: 1
    network:
      serviceName: backup-manager
      ports:
        - port: 80
          targetPort: 80
    variables:
      - name: METADATA_BACKEND
        inputType: Options
        description: "Metadata storage backend: 'mongo' or 'json'"
        required: true
        value: json
      - name: METADATA_MONGO_HOST
        inputType: FreeText
        description: Metadata MongoDB hostname (only when METADATA_BACKEND=mongo)
        value: ''
      - name: METADATA_MONGO_PORT
        inputType: FreeText
        description: Metadata MongoDB port (only when METADATA_BACKEND=mongo)
        value: 27017
      - name: METADATA_MONGO_USERNAME
        inputType: FreeText
        description: Metadata MongoDB username (only when METADATA_BACKEND=mongo)
        value: ''
      - name: METADATA_MONGO_PASSWORD
        inputType: Secret
        description: Metadata MongoDB password (only when METADATA_BACKEND=mongo)
      - name: SECRET_KEY
        inputType: Secret
        description: Encryption key for stored server passwords (Fernet)
        required: true
        secretKey: MONGO_BACKUP_SECRET_KEY
      - name: BLOB_BASE_PATH
        inputType: FreeText
        description: Base path in Quix blob storage for backup archives
        required: true
        value: backups/mongodb
      - name: BACKUP_RETENTION_DAYS
        inputType: FreeText
        description: Default retention period for backups in days
        required: true
        value: 30
    plugin:
      embeddedView:
        enabled: true
        hideHeader: true
        default: true
      sidebarItem:
        show: true
        label: Backup Manager
        icon: save
        order: 0
    blobStorage:
      bind: true

# This section describes the Topics of the data pipeline
topics:
  - name: ac-telemetry-raw
    configuration:
      partitions: 1
      replicationFactor: 1
      retentionInMinutes: -1
      retentionInBytes: 1048576000
  - name: ac-telemetry-session
    configuration:
      partitions: 1
      replicationFactor: 1
      retentionInMinutes: -1
      cleanupPolicy: Compact
  - name: ac-video-frames
    configuration:
      partitions: 1
      replicationFactor: 1
      retentionInMinutes: 60
      retentionInBytes: 536870912
  - name: tsbs_data_transformed
  - name: ac-telemetry-config
  - name: csv-data
  - name: transform
