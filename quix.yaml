# Quix Project Descriptor
# This file describes the data pipeline and configuration of resources of a Quix Project.

metadata:
  version: 1.0

deployments:
  - name: AC Telemetry Source
    application: ac-telemetry-source
    version: latest
    deploymentType: Service
    resources:
      cpu: 200
      memory: 500
      replicas: 1
    variables:
      - name: output
        inputType: OutputTopic
        description: Name of the output topic to write telemetry into
        required: true
        value: ac-telemetry-raw
      - name: SAMPLE_RATE_HZ
        inputType: FreeText
        description: Telemetry sample rate in Hz
        value: 50

topics:
  - name: ac-telemetry-raw
    configuration:
      partitions: 1
      replicationFactor: 1
      retentionInMinutes: 1440
